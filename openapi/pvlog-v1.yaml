  /api/v1/accounts/{account_id}/webhooks:
    parameters: [{ $ref: "#/components/parameters/AccountId" }]
    get:
      {
        operationId: listWebhooks,
        tags: [Notifications],
        summary: List webhook subscriptions,
        description: Returns non-secret webhook subscription metadata.,
        security: [{ bearerAuth: [webhooks:read] }],
        responses:
          {
            "200":
              {
                description: Webhook subscriptions,
                content:
                  {
                    application/json:
                      {
                        schema:
                          {
                            type: array,
                            items:
                              {
                                $ref: "#/components/schemas/WebhookSubscription",
                              },
                          },
                      },
                  },
              },
            "403": { $ref: "#/components/responses/ForbiddenProblem" },
          },
      }
    post:
      operationId: createWebhook
      tags: [Notifications]
      summary: Create a pending webhook subscription
      description: Creates a subscription and returns its endpoint verification challenge.
      security: [{ bearerAuth: [webhooks:write] }]
      requestBody:
        {
          required: true,
          content:
            {
              application/json:
                { schema: { $ref: "#/components/schemas/WebhookInput" } },
            },
        }
      callbacks:
        eventDelivery:
          "{$request.body#/endpoint}":
            post:
              summary: Receive a signed PVLog event
              description: Verifies the timestamp, event ID replay state, and keyed signature before accepting the event.
              security: []
              parameters:
                - {
                    name: X-PVLog-Event-Id,
                    in: header,
                    required: true,
                    schema: { type: string, format: uuid },
                  }
                - {
                    name: X-PVLog-Timestamp,
                    in: header,
                    required: true,
                    schema: { type: integer, format: int64 },
                  }
                - {
                    name: X-PVLog-Signature,
                    in: header,
                    required: true,
                    schema: { type: string, pattern: "^v1=[0-9a-f]{64}$" },
                  }
              requestBody:
                {
                  required: true,
                  content:
                    {
                      application/json:
                        {
                          schema: { $ref: "#/components/schemas/WebhookEvent" },
                        },
                    },
                }
              responses:
                {
                  "204": { description: Event accepted },
                  "400": { description: Signature or replay validation failed },
                }
      responses:
        {
          "201":
            {
              description: Pending subscription and verification challenge,
              content:
                {
                  application/json:
                    {
                      schema:
                        { $ref: "#/components/schemas/WebhookSubscription" },
                    },
                },
            },
          "422": { $ref: "#/components/responses/ValidationProblem" },
        }
  /api/v1/accounts/{account_id}/webhooks/{webhook_id}/verify:
    parameters:
      [
        { $ref: "#/components/parameters/AccountId" },
        {
          name: webhook_id,
          in: path,
          required: true,
          schema: { $ref: "#/components/schemas/UuidV7" },
        },
      ]
    post:
      {
        operationId: verifyWebhook,
        tags: [Notifications],
        summary: Verify webhook endpoint ownership,
        description: Activates a pending subscription when its challenge matches and has not expired.,
        security: [{ bearerAuth: [webhooks:write] }],
        requestBody:
          {
            required: true,
            content:
              {
                application/json:
                  {
                    schema:
                      {
                        type: object,
                        required: [challenge],
                        properties: { challenge: { type: string } },
                      },
                  },
              },
          },
        responses:
          {
            "200":
              {
                description: Active webhook subscription,
                content:
                  {
                    application/json:
                      {
                        schema:
                          { $ref: "#/components/schemas/WebhookSubscription" },
                      },
                  },
              },
            "422": { $ref: "#/components/responses/ValidationProblem" },
          },
      }
  /api/v1/accounts/{account_id}/webhooks/{webhook_id}:
    parameters:
      [
        { $ref: "#/components/parameters/AccountId" },
        {
          name: webhook_id,
          in: path,
          required: true,
          schema: { $ref: "#/components/schemas/UuidV7" },
        },
      ]
    delete:
      {
        operationId: deleteWebhook,
        tags: [Notifications],
        summary: Disable a webhook subscription,
        description: Disables delivery to one webhook subscription.,
        security: [{ bearerAuth: [webhooks:write] }],
        responses:
          {
            "204": { description: Subscription disabled },
            "404": { $ref: "#/components/responses/NotFoundProblem" },
          },
      }
  /api/v1/accounts/{account_id}/webhooks/{webhook_id}/attempts:
    parameters:
      [
        { $ref: "#/components/parameters/AccountId" },
        {
          name: webhook_id,
