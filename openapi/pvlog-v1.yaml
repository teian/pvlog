openapi: 3.1.1
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
info:
  title: PVLog REST API
  version: 0.1.0
  summary: Modern self-hosted photovoltaic monitoring API
  description: >-
    The versioned JSON contract for PVLog.
  license:
    name: Apache License 2.0
    identifier: Apache-2.0
servers:
  - url: /
    description: Current PVLog installation
tags:
  - name: Operations
    description: Process and deployment health
  - name: Systems
    description: PV system lifecycle and account-owned configuration
  - name: Telemetry
    description: Canonical observation ingestion and correction
  - name: Analytics
    description: Resolution-aware time series, statistics, and data quality
  - name: Community
    description: Privacy-safe comparisons and ladders
  - name: Exports
    description: Synchronous and asynchronous analysis exports
  - name: Notifications
    description: Alert rules, events, webhook subscriptions, and delivery attempts
  - name: Authentication
    description: Browser sessions and local authentication lifecycle
  - name: Administration
    description: Authorized account, role, identity, and audit administration
paths:
  /api/v1/health/live:
    get:
      operationId: getLiveness
      summary: Check process liveness
      description: Confirms that the HTTP process can execute requests.
      tags:
        - Operations
      security: []
      responses:
        "200":
          description: Process is live
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              examples:
                live:
                  summary: Live process
                  value:
                    status: ok
                    service: pvlog
                    version: 0.1.0
        "406":
          $ref: "#/components/responses/NotAcceptable"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/health/ready:
    get:
      operationId: getReadiness
      summary: Check dependency readiness
      description: Verifies that the configured management and account database topology is available for serving requests.
      tags: [Operations]
      security: []
      responses:
        "200":
          description: Required runtime dependencies are ready
          content:
            {
              application/json:
                { schema: { $ref: "#/components/schemas/ReadinessStatus" } },
            }
        "406": { $ref: "#/components/responses/NotAcceptable" }
        "503": { $ref: "#/components/responses/ServiceUnavailableProblem" }
  /api/v1/health/version:
    get:
      operationId: getBuildVersion
      summary: Read running build version
      description: Returns process build metadata without checking database or job readiness.
      tags: [Operations]
      security: []
      responses:
        "200":
          description: Running process version
          content:
            {
              application/json:
                { schema: { $ref: "#/components/schemas/HealthStatus" } },
            }
        "406": { $ref: "#/components/responses/NotAcceptable" }
  /api/v1/health/dependencies:
    get:
      operationId: getDependencyHealth
      summary: Check required runtime dependencies
      description: Probes the configured management and account database dependencies.
      tags: [Operations]
      security: []
      responses:
        "200":
          description: Dependencies are reachable
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OperationalHealth" }
        "406": { $ref: "#/components/responses/NotAcceptable" }
        "503": { $ref: "#/components/responses/ServiceUnavailableProblem" }
  /api/v1/health/job-lag:
    get:
      operationId: getJobLagHealth
      summary: Check account job queue lag
      description: Reports whether the durable job queue is within its lag objective.
      tags: [Operations]
      security: []
      responses:
        "200":
          description: Job queue is within its configured lag objective
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OperationalHealth" }
        "406": { $ref: "#/components/responses/NotAcceptable" }
        "503": { $ref: "#/components/responses/ServiceUnavailableProblem" }
  /api/v1/health/storage-integrity:
    get:
      operationId: getStorageIntegrityHealth
      summary: Check storage reachability and integrity state
      description: Reports the latest non-mutating database storage probe result.
      tags: [Operations]
      security: []
      responses:
        "200":
          description: Storage probe passed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OperationalHealth" }
        "406": { $ref: "#/components/responses/NotAcceptable" }
        "503": { $ref: "#/components/responses/ServiceUnavailableProblem" }
  /api/v1/admin/users:
    post:
      operationId: createLocalUser
      summary: Create a local user
      description: Creates an administrator-managed local user without exposing credential material.
      tags: [Administration]
      security: [{ sessionCookie: [] }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/FreeFormObject" } } } }
      responses:
        "201": { description: User created, content: { application/json: { schema: { $ref: "#/components/schemas/FreeFormObject" } } } }
        "400": { $ref: "#/components/responses/Problem" }
  /api/v1/admin/users/{id}:
    parameters: [{ $ref: "#/components/parameters/UserId" }]
    delete:
      operationId: deleteLocalUser
      summary: Delete a local user
      description: Deletes an eligible local user while preserving takeover and last-administrator protections.
      tags: [Administration]
      security: [{ sessionCookie: [] }]
      responses:
        "204": { description: User deleted }
        "400": { $ref: "#/components/responses/Problem" }
  /api/v1/admin/users/{id}/activate:
    parameters: [{ $ref: "#/components/parameters/UserId" }]
    post:
      operationId: activateLocalUser
      summary: Activate a local user
      description: Activates an invited or administrator-created local user.
      tags: [Administration]
      security: [{ sessionCookie: [] }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/FreeFormObject" } } } }
      responses:
        "200": { description: User activated, content: { application/json: { schema: { $ref: "#/components/schemas/FreeFormObject" } } } }
        "400": { $ref: "#/components/responses/Problem" }
  /api/v1/admin/users/{id}/disable:
    parameters: [{ $ref: "#/components/parameters/UserId" }]
    post:
      operationId: disableLocalUser
      summary: Disable a local user
      description: Disables login and revokes active sessions for a local user.
      tags: [Administration]
      security: [{ sessionCookie: [] }]
      responses:
        "204": { description: User disabled }
        "400": { $ref: "#/components/responses/Problem" }
  /api/v1/admin/users/{id}/unlock:
    parameters: [{ $ref: "#/components/parameters/UserId" }]
    post:
      operationId: unlockLocalUser
      summary: Unlock a local user
      description: Clears an administrator-authorized brute-force lockout.
      tags: [Administration]
      security: [{ sessionCookie: [] }]
      responses:
        "204": { description: User unlocked }
        "400": { $ref: "#/components/responses/Problem" }
  /api/v1/admin/users/{id}/password:
    parameters: [{ $ref: "#/components/parameters/UserId" }]
    post:
      operationId: setInitialLocalPassword
      summary: Set an initial local password
      description: Sets the initial password under the configured password policy.
      tags: [Administration]
      security: [{ sessionCookie: [] }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/FreeFormObject" } } } }
      responses:
        "204": { description: Password set }
        "400": { $ref: "#/components/responses/Problem" }
  /api/v1/auth/register:
    post:
      operationId: registerLocalUser
      summary: Register a local user
      description: Registers a local user when instance self-registration policy permits it.
      tags: [Authentication]
      security: []
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/FreeFormObject" } } } }
      responses:
        "202": { description: Registration accepted }
        "400": { $ref: "#/components/responses/Problem" }
  /api/v1/auth/password:
    put:
      operationId: changeLocalPassword
      summary: Change the current local password
      description: Changes a password after current-password verification and revokes other sessions.
      tags: [Authentication]
      security: [{ sessionCookie: [] }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/FreeFormObject" } } } }
      responses:
        "204": { description: Password changed }
        "400": { $ref: "#/components/responses/Problem" }
  /api/v1/auth/password-recovery:
    post:
      operationId: requestPasswordRecovery
      summary: Request password recovery
      description: Returns an enumeration-resistant acceptance response and emits a single-use token out of band.
      tags: [Authentication]
      security: []
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/FreeFormObject" } } } }
      responses:
        "202": { description: Recovery request accepted }
        "400": { $ref: "#/components/responses/Problem" }
  /api/v1/auth/password-recovery/complete:
    post:
      operationId: completePasswordRecovery
      summary: Complete password recovery
      description: Consumes a single-use recovery token and rotates the local password.
      tags: [Authentication]
      security: []
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/FreeFormObject" } } } }
      responses:
        "204": { description: Recovery completed }
        "400": { $ref: "#/components/responses/Problem" }
  /api/v1/community/systems:
    get:
      operationId: searchCommunitySystems
      summary: Search visible community systems
      description: Searches privacy-safe system projections using visibility and location filters.
      tags: [Community]
      security: [{ bearerAuth: [community:read] }]
      responses:
        "200": { description: Matching projections, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/FreeFormObject" } } } } }
        "400": { $ref: "#/components/responses/Problem" }
  /api/v1/users/me/favourites:
    get:
      operationId: listFavouriteSystems
      summary: List favourite systems
      description: Lists the signed-in user's privacy-filtered favourite projections.
      tags: [Community]
      security: [{ sessionCookie: [] }]
      responses:
        "200": { description: Favourite systems, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/FreeFormObject" } } } } }
        "400": { $ref: "#/components/responses/Problem" }
  /api/v1/users/me/favourites/{system_id}:
    parameters: [{ name: system_id, in: path, required: true, schema: { $ref: "#/components/schemas/UuidV7" } }]
    post:
      operationId: addFavouriteSystem
      summary: Add a favourite system
      description: Adds a currently visible system to the signed-in user's favourites.
      tags: [Community]
      security: [{ sessionCookie: [] }]
      responses:
        "204": { description: Favourite added }
        "400": { $ref: "#/components/responses/Problem" }
    delete:
      operationId: removeFavouriteSystem
      summary: Remove a favourite system
      description: Removes a system from the signed-in user's favourites.
      tags: [Community]
      security: [{ sessionCookie: [] }]
      responses:
        "204": { description: Favourite removed }
        "400": { $ref: "#/components/responses/Problem" }
  /api/v1/teams:
    post:
      operationId: createTeam
      summary: Create a team
      description: Creates a private, unlisted, or public team owned by the caller.
      tags: [Community]
      security: [{ bearerAuth: [community:write] }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/FreeFormObject" } } } }
      responses:
        "201": { description: Team created, content: { application/json: { schema: { $ref: "#/components/schemas/FreeFormObject" } } } }
        "400": { $ref: "#/components/responses/Problem" }
  /api/v1/teams/{team_id}/ownership:
    parameters: [{ $ref: "#/components/parameters/TeamId" }]
    post:
      operationId: transferTeamOwnership
      summary: Transfer team ownership
      description: Transfers ownership to an eligible team member.
      tags: [Community]
      security: [{ bearerAuth: [community:write] }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/FreeFormObject" } } } }
      responses:
        "204": { description: Ownership transferred }
        "400": { $ref: "#/components/responses/Problem" }
  /api/v1/teams/{team_id}/memberships:
    parameters: [{ $ref: "#/components/parameters/TeamId" }]
    post:
      operationId: joinTeam
      summary: Join a system to a team
      description: Adds an eligible system using effective-dated membership.
      tags: [Community]
      security: [{ bearerAuth: [community:write] }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/FreeFormObject" } } } }
      responses:
        "204": { description: System joined }
        "400": { $ref: "#/components/responses/Problem" }
  /api/v1/teams/{team_id}/memberships/{system_id}:
    parameters:
      - { $ref: "#/components/parameters/TeamId" }
      - { name: system_id, in: path, required: true, schema: { $ref: "#/components/schemas/UuidV7" } }
    delete:
      operationId: leaveTeam
      summary: Remove a system from a team
      description: Ends the system's effective team membership.
      tags: [Community]
      security: [{ bearerAuth: [community:write] }]
      responses:
        "204": { description: System removed }
        "400": { $ref: "#/components/responses/Problem" }
  /api/v1/teams/{team_id}/aggregate:
    parameters: [{ $ref: "#/components/parameters/TeamId" }]
    get:
      operationId: getTeamAggregate
      summary: Get a team aggregate
      description: Returns privacy-safe effective-capacity and energy aggregates for a period.
      tags: [Community]
      security: [{ bearerAuth: [community:read] }]
      responses:
        "200": { description: Team aggregate, content: { application/json: { schema: { $ref: "#/components/schemas/FreeFormObject" } } } }
        "400": { $ref: "#/components/responses/Problem" }
  /api/v1/teams/{team_id}/ladder:
    parameters: [{ $ref: "#/components/parameters/TeamId" }]
    get:
      operationId: getTeamLadder
      summary: Get a team ladder
      description: Returns eligibility, coverage, normalization, and tie-aware rankings.
      tags: [Community]
      security: [{ bearerAuth: [community:read] }]
      responses:
        "200": { description: Team ladder, content: { application/json: { schema: { $ref: "#/components/schemas/FreeFormObject" } } } }
        "400": { $ref: "#/components/responses/Problem" }
  /api/v1/systems:
    post:
      operationId: createSystem
      tags: [Systems]
      summary: Create a private PV system
      description: Creates one account-owned system using private and active defaults.
      security: [{ bearerAuth: [systems:write] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateSystem" }
            example:
              {
                accountId: 019505c8-7c85-7f0b-9bc3-2a3c4d5e6f70,
                name: Roof PV,
                timezone: Europe/Berlin,
              }
      responses:
        "201": { $ref: "#/components/responses/SystemResponse" }
        "422": { $ref: "#/components/responses/ValidationProblem" }
  /api/v1/systems/{id}:
    parameters:
      - $ref: "#/components/parameters/SystemId"
    put:
      operationId: updateSystem
      tags: [Systems]
      summary: Update a PV system
      description: Replaces mutable system settings when the supplied ETag is current.
      security: [{ bearerAuth: [systems:write] }]
      parameters: [{ $ref: "#/components/parameters/IfMatch" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateSystem" }
      responses:
        "200": { $ref: "#/components/responses/SystemResponse" }
        "412": { $ref: "#/components/responses/PreconditionProblem" }
    delete:
      operationId: deleteSystem
      tags: [Systems]
      summary: Permanently delete a PV system
      description: Starts confirmed permanent deletion when the supplied ETag is current.
      security: [{ bearerAuth: [systems:write] }]
      parameters:
        - $ref: "#/components/parameters/IfMatch"
        - {
            name: X-Confirm-Delete,
            in: header,
            required: true,
            schema: { type: boolean },
          }
      responses:
        "204": { description: System deletion accepted }
        "412": { $ref: "#/components/responses/PreconditionProblem" }
  /api/v1/systems/{id}/archive:
    post:
      operationId: archiveSystem
      tags: [Systems]
      summary: Archive a PV system
      description: Makes an active system inactive without deleting its stored data.
      security: [{ bearerAuth: [systems:write] }]
      parameters:
        - $ref: "#/components/parameters/SystemId"
        - $ref: "#/components/parameters/IfMatch"
      responses:
        {
          "200": { $ref: "#/components/responses/SystemResponse" },
          "412": { $ref: "#/components/responses/PreconditionProblem" },
        }
  /api/v1/systems/{id}/restore:
    post:
      operationId: restoreSystem
      tags: [Systems]
      summary: Restore a PV system
      description: Returns an archived system to active service.
      security: [{ bearerAuth: [systems:write] }]
      parameters:
        - $ref: "#/components/parameters/SystemId"
        - $ref: "#/components/parameters/IfMatch"
      responses:
        {
          "200": { $ref: "#/components/responses/SystemResponse" },
          "412": { $ref: "#/components/responses/PreconditionProblem" },
        }
  /api/v1/accounts/{account_id}/systems/{system_id}/equipment:
    parameters:
      [
        { $ref: "#/components/parameters/AccountId" },
        { $ref: "#/components/parameters/NestedSystemId" },
      ]
    get:
      {
        operationId: listEquipment,
        summary: List equipment,
        description: Lists effective-dated equipment for one system.,
        tags: [Systems],
        security: [{ bearerAuth: [systems:read] }],
        responses:
          {
            "200": { $ref: "#/components/responses/ResourceList" },
            "403": { $ref: "#/components/responses/ForbiddenProblem" },
          },
      }
    post:
      {
        operationId: createEquipment,
        summary: Create equipment,
        description: Adds validated effective-dated equipment to one system.,
        tags: [Systems],
        security: [{ bearerAuth: [systems:write] }],
        requestBody: { $ref: "#/components/requestBodies/ManagedResource" },
        responses:
          {
            "201": { $ref: "#/components/responses/ManagedResource" },
            "403": { $ref: "#/components/responses/ForbiddenProblem" },
          },
      }
  /api/v1/accounts/{account_id}/systems/{system_id}/inverters:
    parameters:
      [
        { $ref: "#/components/parameters/AccountId" },
        { $ref: "#/components/parameters/NestedSystemId" },
      ]
    get:
      operationId: listInverters
      summary: List effective inverter aggregates
      description: Lists inverters and their effective PV strings for one system.
      tags: [Systems]
      security: [{ bearerAuth: [systems:read] }]
      responses:
        "200":
          description: Effective inverter aggregates.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Inverter" }
        "403": { $ref: "#/components/responses/ForbiddenProblem" }
    post:
      operationId: createInverter
      summary: Create an inverter aggregate
      description: Atomically creates one inverter and its complete PV-string subtree.
      tags: [Systems]
      security: [{ bearerAuth: [systems:write] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/InverterInput" }
      responses:
        "201":
          description: Inverter aggregate created.
          headers:
            ETag: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Inverter" }
        "403": { $ref: "#/components/responses/ForbiddenProblem" }
        "422": { $ref: "#/components/responses/ValidationProblem" }

  /api/v1/accounts/{account_id}/systems/{system_id}/tariffs:
    parameters:
      [
        { $ref: "#/components/parameters/AccountId" },
        { $ref: "#/components/parameters/NestedSystemId" },
      ]
    get:
      {
        operationId: listTariffs,
        summary: List tariffs,
        description: Lists effective-dated tariffs for one system.,
        tags: [Systems],
        security: [{ bearerAuth: [systems:read] }],
        responses:
          {
            "200": { $ref: "#/components/responses/ResourceList" },
            "403": { $ref: "#/components/responses/ForbiddenProblem" },
          },
      }
    post:
      {
        operationId: createTariff,
        summary: Create tariff,
        description: Adds a validated effective-dated tariff to one system.,
        tags: [Systems],
        security: [{ bearerAuth: [systems:write] }],
        requestBody: { $ref: "#/components/requestBodies/ManagedResource" },
        responses:
          {
            "201": { $ref: "#/components/responses/ManagedResource" },
            "403": { $ref: "#/components/responses/ForbiddenProblem" },
          },
      }
  /api/v1/accounts/{account_id}/systems/{system_id}/channels:
    parameters:
      [
        { $ref: "#/components/parameters/AccountId" },
        { $ref: "#/components/parameters/NestedSystemId" },
      ]
    get:
      {
        operationId: listChannels,
        summary: List channels,
        description: Lists typed extended channels for one system.,
        tags: [Systems],
        security: [{ bearerAuth: [systems:read] }],
        responses:
          {
            "200": { $ref: "#/components/responses/ResourceList" },
            "403": { $ref: "#/components/responses/ForbiddenProblem" },
          },
      }
    post:
      {
        operationId: createChannel,
        summary: Create channel,
        description: Adds a validated typed extended channel to one system.,
        tags: [Systems],
        security: [{ bearerAuth: [systems:write] }],
        requestBody: { $ref: "#/components/requestBodies/ManagedResource" },
        responses:
          {
            "201": { $ref: "#/components/responses/ManagedResource" },
            "403": { $ref: "#/components/responses/ForbiddenProblem" },
          },
      }
  /api/v1/accounts/{account_id}/memberships:
    parameters: [{ $ref: "#/components/parameters/AccountId" }]
    get:
      {
        operationId: listMemberships,
        summary: List memberships,
        description: Lists authorized memberships in one account.,
        tags: [Systems],
        security: [{ bearerAuth: [systems:read] }],
        responses:
          {
            "200": { $ref: "#/components/responses/ResourceList" },
            "403": { $ref: "#/components/responses/ForbiddenProblem" },
          },
      }
    post:
      {
        operationId: createMembership,
        summary: Create membership,
        description: Adds a validated membership to one account.,
        tags: [Systems],
        security: [{ bearerAuth: [systems:write] }],
        requestBody: { $ref: "#/components/requestBodies/ManagedResource" },
        responses:
          {
            "201": { $ref: "#/components/responses/ManagedResource" },
            "403": { $ref: "#/components/responses/ForbiddenProblem" },
          },
      }
  /api/v1/accounts/{account_id}/credentials:
    parameters: [{ $ref: "#/components/parameters/AccountId" }]
    get:
      {
        operationId: listCredentials,
        summary: List credentials,
        description: Lists non-secret credential metadata in one account.,
        tags: [Systems],
        security: [{ bearerAuth: [systems:read] }],
        responses:
          {
            "200": { $ref: "#/components/responses/ResourceList" },
            "403": { $ref: "#/components/responses/ForbiddenProblem" },
          },
      }
    post:
      {
        operationId: createCredential,
        summary: Create credential,
        description: Creates a scoped credential and returns its secret only once.,
        tags: [Systems],
        security: [{ bearerAuth: [systems:write] }],
        requestBody: { $ref: "#/components/requestBodies/ManagedResource" },
        responses:
          {
            "201": { $ref: "#/components/responses/ManagedResource" },
            "403": { $ref: "#/components/responses/ForbiddenProblem" },
          },
      }
  /api/v1/systems/{system_id}/observations:
    parameters: [{ $ref: "#/components/parameters/NestedSystemId" }]
    post:
      operationId: createObservation
      summary: Ingest one observation
      description: Normalizes and durably stores one idempotent canonical observation.
      tags: [Telemetry]
      security: [{ bearerAuth: [telemetry:write] }]
      parameters:
        [
          {
            name: Idempotency-Key,
            in: header,
            required: true,
            schema: { type: string, minLength: 1 },
          },
        ]
      requestBody:
        {
          required: true,
          content:
            {
              application/json:
                {
                  schema: { $ref: "#/components/schemas/ObservationInput" },
                  example:
                    {
                      observedAtEpochMillis: 1780000000000,
                      generationPowerWatts: 4200,
                      generationEnergyWh: 350,
                    },
                },
            },
        }
      responses:
        {
          "201":
            {
              description: Observation accepted,
              content: { application/json: { schema: { type: object } } },
            },
          "422": { $ref: "#/components/responses/ValidationProblem" },
          "503": { $ref: "#/components/responses/OverloadProblem" },
        }
  /api/v1/systems/{system_id}/observations/batch:
    parameters: [{ $ref: "#/components/parameters/NestedSystemId" }]
    post:
      operationId: createObservationBatch
      summary: Ingest an observation batch
      description: Processes a bounded batch in atomic or partial-result mode.
      tags: [Telemetry]
      security: [{ bearerAuth: [telemetry:write] }]
      requestBody:
        {
          required: true,
          content:
            {
              application/json:
                {
                  schema:
                    { $ref: "#/components/schemas/ObservationBatchInput" },
                },
            },
        }
      responses:
        {
          "200":
            {
              description: Stable indexed batch outcomes,
              content: { application/json: { schema: { type: object } } },
            },
          "422": { $ref: "#/components/responses/ValidationProblem" },
          "503": { $ref: "#/components/responses/OverloadProblem" },
        }
  /api/v1/systems/{system_id}/observations/{observation_id}:
    parameters:
      [
        { $ref: "#/components/parameters/NestedSystemId" },
        { $ref: "#/components/parameters/ObservationId" },
      ]
    patch:
      operationId: correctObservation
      summary: Correct an observation
      description: Applies an optimistic replacement or deletion overlay and schedules reconciliation.
      tags: [Telemetry]
      security: [{ bearerAuth: [telemetry:write] }]
      requestBody:
        {
          required: true,
          content:
            {
              application/json:
                {
                  schema:
                    {
                      type: object,
                      required: [expectedVersion, reason, delete],
                      properties:
                        {
                          expectedVersion: { type: integer, minimum: 1 },
                          reason: { type: string, minLength: 1 },
                          generationPowerWatts: { type: integer },
                          delete: { type: boolean },
                        },
                    },
                },
            },
        }
      responses:
        {
          "200":
            {
              description: Immediately visible merged observation,
              content: { application/json: { schema: { type: object } } },
            },
          "409": { $ref: "#/components/responses/ConflictProblem" },
        }
    delete:
      operationId: deleteObservation
      summary: Delete an observation
      description: Records an optimistic deletion while preserving audit and reconciliation history.
      tags: [Telemetry]
      security: [{ bearerAuth: [telemetry:write] }]
      parameters:
        [
          { $ref: "#/components/parameters/IfMatch" },
          {
            name: X-Correction-Reason,
            in: header,
            required: true,
            schema: { type: string, minLength: 1 },
          },
        ]
      responses:
        {
          "204": { description: Deletion accepted },
          "409": { $ref: "#/components/responses/ConflictProblem" },
        }
  /api/v1/systems/{system_id}/series:
    parameters:
      - $ref: "#/components/parameters/NestedSystemId"
      - $ref: "#/components/parameters/StartEpochMillis"
      - $ref: "#/components/parameters/EndEpochMillis"
      - $ref: "#/components/parameters/SeriesFields"
      - $ref: "#/components/parameters/SeriesResolution"
      - $ref: "#/components/parameters/Timezone"
      - $ref: "#/components/parameters/MaximumPoints"
      - $ref: "#/components/parameters/IfNoneMatch"
    get:
      operationId: getSystemSeries
      summary: Query bounded system time series
      description: >-
        Returns corrected raw observations or the finest available rollup that
        stays within maximumPoints. Calendar resolutions use the requested IANA
        timezone, so DST days may contain 23 or 25 hours. Raw requests are never
        silently replaced with aggregates.
      tags: [Analytics]
      security: [{ bearerAuth: [analytics:read] }]
      responses:
        "200":
          description: Resolution-aware multi-series result
          headers:
            ETag:
              {
                schema: { type: string },
                description: Validator for the query and source generations.,
              }
            Last-Modified: { schema: { type: string, format: http-date } }
            Vary: { schema: { type: string }, example: "Accept, Authorization" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SeriesQueryResult" }
              examples:
                dstDay:
                  summary: Europe/Berlin spring DST day
                  value:
                    actualResolution: hourly
                    timezone: Europe/Berlin
                    series:
                      - field: generation_power
                        unit: watts
                        points:
                          - {
                              timestampEpochMillis: 1774738800000,
                              value: 4200,
                              coverageBasisPoints: 10000,
                              qualityFlags: 0,
                            }
                        gaps: []
        "304": { description: The query result has not changed. }
        "403": { $ref: "#/components/responses/ForbiddenProblem" }
        "422": { $ref: "#/components/responses/QueryProblem" }
  /api/v1/systems/{system_id}/statistics:
    parameters:
      - $ref: "#/components/parameters/NestedSystemId"
      - name: period
        in: query
        required: true
        schema: { enum: [day, month, year, lifetime] }
      - $ref: "#/components/parameters/IfNoneMatch"
    get:
      operationId: getSystemStatistics
      summary: Get period energy statistics
      description: Returns available energy, grid, efficiency, peak, environmental, battery, financial, and coverage statistics without replacing unavailable fields with zero.
      tags: [Analytics]
      security: [{ bearerAuth: [analytics:read] }]
      responses:
        "200":
          description: Period statistics
          headers:
            {
              ETag: { schema: { type: string } },
              Last-Modified: { schema: { type: string, format: http-date } },
            }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EnergyStatistics" }
              example:
                {
                  period: daily,
                  generationWh: 18400,
                  consumptionWh: 12100,
                  gridImportWh: 2400,
                  gridExportWh: 8700,
                  efficiencyWhPerKw: 3066,
                  peakGenerationWatts: 5800,
                  coverageBasisPoints: 9850,
                }
        "304": { description: Statistics have not changed. }
        "422": { $ref: "#/components/responses/QueryProblem" }
  /api/v1/systems/{system_id}/data-quality:
    parameters:
      - $ref: "#/components/parameters/NestedSystemId"
      - $ref: "#/components/parameters/StartEpochMillis"
      - $ref: "#/components/parameters/EndEpochMillis"
    get:
      operationId: getSystemDataQuality
      summary: List missing and suspect data intervals
      description: Reports missing intervals, suspect observations, source conflicts, counter resets, rejected ingestion, and aggregate lag without fabricating raw points.
      tags: [Analytics]
      security: [{ bearerAuth: [analytics:read] }]
      responses:
        "200":
          description: Ordered data-quality issues
          content:
            application/json:
              schema:
                {
                  type: array,
                  items: { $ref: "#/components/schemas/DataQualityIssue" },
                }
              example:
                - {
                    kind: missing_interval,
                    startEpochMillis: 1780000000000,
                    endEpochMillis: 1780001800000,
                    sourceReferences: [],
                    reasonCode: not_reported,
                  }
        "422": { $ref: "#/components/responses/QueryProblem" }
  /api/v1/comparisons:
    post:
      operationId: compareSystems
      summary: Compare visible systems
      description: Compares between 2 and 20 authorized or public systems with effective-capacity normalization, coverage, privacy, and deterministic tie semantics.
      tags: [Community]
      security: [{ bearerAuth: [community:read] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ComparisonRequest" }
            example:
              {
                systemIds:
                  [
                    019505c8-7c85-7f0b-9bc3-2a3c4d5e6f70,
                    019505c8-7c85-7f0b-9bc3-2a3c4d5e6f71,
                  ],
                metric: normalized_generation,
              }
      responses:
        "200":
          {
            description: Ranked comparison,
            content:
              {
                application/json:
                  {
                    schema:
                      {
                        type: array,
                        items: { $ref: "#/components/schemas/ComparisonEntry" },
                      },
                  },
              },
          }
        "403": { $ref: "#/components/responses/ForbiddenProblem" }
        "422": { $ref: "#/components/responses/QueryProblem" }
  /api/v1/ladders:
    get:
      operationId: getLadder
      summary: Get a public or team ladder
      description: Returns eligible public systems ordered by the selected metric with competition ranks such as 1, 1, 3 and projection freshness metadata.
      tags: [Community]
      security: [{ bearerAuth: [community:read] }]
      parameters:
        - name: teamId
          in: query
          schema: { $ref: "#/components/schemas/UuidV7" }
        - name: metric
          in: query
          schema:
            {
              $ref: "#/components/schemas/ComparisonMetric",
              default: normalized_generation,
            }
        - $ref: "#/components/parameters/IfNoneMatch"
      responses:
        "200":
          description: Ladder entries
          headers:
            {
              ETag: { schema: { type: string } },
              Last-Modified: { schema: { type: string, format: http-date } },
            }
          content:
            {
              application/json:
                {
                  schema:
                    {
                      type: array,
                      items: { $ref: "#/components/schemas/ComparisonEntry" },
                    },
                },
            }
        "304": { description: Ladder projections have not changed. }
        "422": { $ref: "#/components/responses/QueryProblem" }
  /api/v1/systems/{system_id}/analysis-exports:
    parameters: [{ $ref: "#/components/parameters/NestedSystemId" }]
    post:
      operationId: createAnalysisExport
      summary: Export an analysis query as CSV or JSON
      description: >-
        Returns a bounded export synchronously or queues a durable job. CSV uses
        stable headers timestamp_epoch_millis, field, value, unit,
        coverage_basis_points, quality_flags, resolution, and timezone.
      tags: [Exports]
      security: [{ bearerAuth: [exports:write] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AnalysisExportRequest" }
            examples:
              csv:
                value:
                  {
                    startEpochMillis: 1774738800000,
                    endEpochMillis: 1774821600000,
                    fields: [generation_power, consumption_power],
                    resolution: hour,
                    timezone: Europe/Berlin,
                    maximumPoints: 2000,
                    format: csv,
                    asynchronous: false,
                  }
              queuedJson:
                value:
                  {
                    startEpochMillis: 990000000000,
                    endEpochMillis: 1780000000000,
                    fields: [generation_energy],
                    resolution: day,
                    timezone: UTC,
                    maximumPoints: 10000,
                    format: json,
                    asynchronous: true,
                  }
      responses:
        "200":
          description: Synchronous export artifact
          headers:
            Content-Disposition:
              {
                schema: { type: string },
                example: attachment; filename="generation.csv",
              }
          content:
            text/csv:
              schema: { type: string }
              example: |-
                timestamp_epoch_millis,field,value,unit,coverage_basis_points,quality_flags,resolution,timezone
                1774738800000,generation_power,4200,watts,10000,0,hour,Europe/Berlin
            application/json:
              schema: { $ref: "#/components/schemas/SeriesQueryResult" }
        "202":
          description: Export job accepted
          headers:
            {
              Location:
                {
                  schema: { type: string, format: uri-reference },
                  example: /api/v1/jobs/019505c8-7c85-7f0b-9bc3-2a3c4d5e6f72,
                },
            }
          content:
            {
              application/json:
                {
                  schema: { $ref: "#/components/schemas/QueuedJob" },
                  example: { jobId: 019505c8-7c85-7f0b-9bc3-2a3c4d5e6f72 },
                },
            }
        "413": { $ref: "#/components/responses/RequiresAsyncProblem" }
        "422": { $ref: "#/components/responses/QueryProblem" }
  /api/v1/accounts/{account_id}/alerts:
