      description: Requires browser-session instance administration and CSRF validation. The activation token is returned only in this response and must be delivered through an approved secure channel.
      security: [{ sessionCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/CsrfToken" }]
      requestBody:
        required: true
        content:
          {
            application/json:
              { schema: { $ref: "#/components/schemas/CreateInvitation" } },
          }
      responses:
        "201":
          description: One-time invitation material; do not log or persist the activation token client-side.
          content:
            {
              application/json:
                { schema: { $ref: "#/components/schemas/InvitationCreated" } },
            }
        "403": { $ref: "#/components/responses/ForbiddenProblem" }
  /api/v1/users/me/identities:
    get:
      operationId: listLinkedIdentities
      tags: [Administration]
      summary: List external identities linked to the browser user
      description: Returns only identities owned by the user represented by the browser session.
      security: [{ sessionCookie: [] }]
      responses:
        "200":
          description: Linked external identities
          content:
            {
              application/json:
                {
                  schema:
                    {
                      type: array,
                      items: { $ref: "#/components/schemas/LinkedIdentity" },
                    },
                },
            }
        "403": { $ref: "#/components/responses/ForbiddenProblem" }
  /api/v1/accounts/{account_id}/audit-events:
    parameters: [{ $ref: "#/components/parameters/AccountId" }]
    get:
      operationId: listAccountAuditEvents
      tags: [Administration]
      summary: List safe account audit events
      description: Requires the `audit:read` permission at account scope; metadata is already server-filtered.
      security: [{ bearerAuth: [audit:read] }, { sessionCookie: [] }]
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 500, default: 100 }
      responses:
        "200":
          description: Bounded audit event collection
          content:
            {
              application/json:
                {
                  schema:
                    {
                      type: array,
                      items: { $ref: "#/components/schemas/AuditEvent" },
                    },
                },
            }
        "403": { $ref: "#/components/responses/ForbiddenProblem" }
  /api/v1/accounts/{account_id}/roles:
    parameters: [{ $ref: "#/components/parameters/AccountId" }]
    get:
      operationId: listAccountRoles
      tags: [Administration]
      summary: List account roles
      description: Returns roles only after the server verifies account-scoped role-management permission.
      security: [{ bearerAuth: [roles:manage] }, { sessionCookie: [] }]
      responses:
        "200":
          description: Role catalog
          content:
            {
              application/json:
                {
                  schema:
                    {
                      type: array,
                      items: { $ref: "#/components/schemas/Role" },
                    },
                },
            }
        "403": { $ref: "#/components/responses/ForbiddenProblem" }
    post:
      operationId: createAccountRole
      tags: [Administration]
      summary: Create a constrained custom account role
      description: Creates a custom role after a browser-session administrator passes delegation checks.
      security: [{ sessionCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/CsrfToken" }]
      requestBody:
        required: true
        content:
          {
            application/json:
              { schema: { $ref: "#/components/schemas/RoleInput" } },
          }
      responses:
        "201": { $ref: "#/components/responses/RoleResponse" }
        "403": { $ref: "#/components/responses/ForbiddenProblem" }
  /api/v1/accounts/{account_id}/roles/{role_id}:
    parameters:
      - $ref: "#/components/parameters/AccountId"
      - $ref: "#/components/parameters/RoleId"
    patch:
      operationId: updateAccountRole
      tags: [Administration]
      summary: Update a constrained custom account role
      description: Updates a custom role after server-side delegation and account-scope authorization.
      security: [{ sessionCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/CsrfToken" }]
      requestBody:
        required: true
        content:
          {
            application/json:
              { schema: { $ref: "#/components/schemas/RoleInput" } },
          }
      responses:
        "200": { $ref: "#/components/responses/RoleResponse" }
        "403": { $ref: "#/components/responses/ForbiddenProblem" }
    delete:
      operationId: deleteAccountRole
      tags: [Administration]
      summary: Delete a constrained custom account role
      description: Deletes a custom role after server-side delegation and account-scope authorization.
      security: [{ sessionCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/CsrfToken" }]
      responses:
        "204": { description: Role deleted }
        "403": { $ref: "#/components/responses/ForbiddenProblem" }
  /api/v1/accounts/{account_id}/role-assignments:
    parameters: [{ $ref: "#/components/parameters/AccountId" }]
    post:
      operationId: assignAccountRole
      tags: [Administration]
      summary: Assign a role to a user or API credential at account or system scope
      description: Creates an account- or system-scoped assignment after delegation validation.
      security: [{ sessionCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/CsrfToken" }]
      requestBody:
        required: true
        content:
          {
            application/json:
              { schema: { $ref: "#/components/schemas/RoleAssignmentInput" } },
          }
      responses:
        "201": { $ref: "#/components/responses/RoleAssignmentResponse" }
        "403": { $ref: "#/components/responses/ForbiddenProblem" }
  /api/v1/accounts/{account_id}/role-assignments/{assignment_id}:
    parameters:
      - $ref: "#/components/parameters/AccountId"
      - $ref: "#/components/parameters/RoleAssignmentId"
    delete:
      operationId: revokeAccountRoleAssignment
      tags: [Administration]
      summary: Revoke a role assignment
      description: Revokes an account- or system-scoped assignment after server-side authorization.
      security: [{ sessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
        - name: systemId
          in: query
          schema: { $ref: "#/components/schemas/UuidV7" }
      responses:
        "204": { description: Role assignment revoked }
        "403": { $ref: "#/components/responses/ForbiddenProblem" }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
    sessionCookie:
      type: apiKey
      in: cookie
      name: __Host-pvlog_session
  parameters:
    UserId:
      name: id
      in: path
      required: true
      schema: { $ref: "#/components/schemas/UuidV7" }
    TeamId:
      name: team_id
      in: path
      required: true
      schema: { $ref: "#/components/schemas/UuidV7" }
    SystemId:
      {
        name: id,
        in: path,
        required: true,
        schema: { $ref: "#/components/schemas/UuidV7" },
      }
    AccountId:
      {
        name: account_id,
        in: path,
        required: true,
        schema: { $ref: "#/components/schemas/UuidV7" },
      }
    RoleId:
      {
        name: role_id,
        in: path,
        required: true,
        schema: { $ref: "#/components/schemas/UuidV7" },
      }
    RoleAssignmentId:
      {
        name: assignment_id,
        in: path,
        required: true,
        schema: { $ref: "#/components/schemas/UuidV7" },
      }
    CsrfToken:
      {
        name: X-CSRF-Token,
        in: header,
        required: true,
        schema: { type: string, minLength: 1 },
      }
    NestedSystemId:
      {
        name: system_id,
        in: path,
        required: true,
        schema: { $ref: "#/components/schemas/UuidV7" },
      }
    ObservationId:
      {
        name: observation_id,
        in: path,
        required: true,
        schema: { $ref: "#/components/schemas/UuidV7" },
      }
    IfMatch:
      {
        name: If-Match,
        in: header,
        required: true,
        schema: { type: string },
        example: '"3"',
      }
    IfNoneMatch:
      {
        name: If-None-Match,
        in: header,
        required: false,
        schema: { type: string },
        example: '"query-7f4a"',
      }
    StartEpochMillis:
      {
        name: startEpochMillis,
        in: query,
        required: true,
        schema: { type: integer, format: int64 },
        description: Inclusive UTC range start in Unix epoch milliseconds.,
      }
    EndEpochMillis:
      {
        name: endEpochMillis,
        in: query,
        required: true,
        schema: { type: integer, format: int64 },
        description: Exclusive UTC range end in Unix epoch milliseconds.,
      }
    SeriesFields:
      {
        name: fields,
        in: query,
        required: true,
        schema: { type: string, minLength: 1 },
        example: "generation_power,consumption_power",
      }
    SeriesResolution:
      {
        name: resolution,
        in: query,
        required: false,
        schema:
          { enum: [auto, raw, 15m, hour, day, month, year], default: auto },
      }
    Timezone:
      {
        name: timezone,
        in: query,
        required: false,
        schema: { type: string, default: UTC },
        description: IANA timezone used for calendar buckets and DST boundaries.,
        example: Europe/Berlin,
      }
    MaximumPoints:
      {
        name: maximumPoints,
        in: query,
        required: false,
        schema: { type: integer, minimum: 1, maximum: 10000, default: 2000 },
        description: Hard per-series point budget; responses may include at most two documented boundary points.,
      }
  requestBodies:
    ManagedResource:
      content:
        application/json:
          schema: { type: object, additionalProperties: true }
          example: { name: Example resource }
  responses:
    Problem:
      description: Request rejected with a standards-based problem detail
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    SystemResponse:
      description: Versioned system representation
      headers: { ETag: { schema: { type: string } } }
      content:
        {
          application/json: { schema: { $ref: "#/components/schemas/System" } },
        }
    ManagedResource:
      description: Versioned managed resource
      headers: { ETag: { schema: { type: string } } }
      content:
        {
          application/json:
            { schema: { $ref: "#/components/schemas/ManagedResource" } },
        }
    ResourceList:
      description: Managed resource collection
      content:
        {
          application/json:
            {
              schema:
                {
                  type: array,
                  items: { $ref: "#/components/schemas/ManagedResource" },
                },
            },
        }
    ValidationProblem:
      {
        description: Request validation failed,
        content:
          {
            application/problem+json:
              { schema: { $ref: "#/components/schemas/Problem" } },
          },
      }
    PreconditionProblem:
      {
        description: ETag precondition failed,
        content:
          {
            application/problem+json:
              { schema: { $ref: "#/components/schemas/Problem" } },
          },
      }
    ForbiddenProblem:
      {
        description: Required scope is missing,
        content:
          {
            application/problem+json:
              { schema: { $ref: "#/components/schemas/Problem" } },
          },
      }
    UnauthorizedProblem:
      {
        description: Authentication is required or the supplied credential was rejected,
        content:
          {
            application/problem+json:
              { schema: { $ref: "#/components/schemas/Problem" } },
          },
      }
    RoleResponse:
      description: Versioned custom or built-in role
      content:
        { application/json: { schema: { $ref: "#/components/schemas/Role" } } }
    RoleAssignmentResponse:
      description: Created role assignment
      content:
        {
          application/json:
            { schema: { $ref: "#/components/schemas/RoleAssignment" } },
        }
    ConflictProblem:
      {
        description: Optimistic concurrency conflict,
        content:
          {
            application/problem+json:
              { schema: { $ref: "#/components/schemas/Problem" } },
          },
      }
    NotFoundProblem:
      {
        description: Notification resource was not found,
        content:
          {
            application/problem+json:
              { schema: { $ref: "#/components/schemas/Problem" } },
          },
      }
    OverloadProblem:
      {
        description: Ingestion is temporarily saturated,
        headers: { Retry-After: { schema: { type: integer, minimum: 1 } } },
        content:
          {
            application/problem+json:
              { schema: { $ref: "#/components/schemas/Problem" } },
          },
      }
    QueryProblem:
      {
        description: "Query bounds, fields, resolution, timezone, or point budget are invalid.",
        content:
          {
            application/problem+json:
              {
                schema: { $ref: "#/components/schemas/Problem" },
                example:
                  {
                    type: https://pvlog.example/problems/query,
                    title: Invalid analytics query,
                    status: 422,
                    detail: The raw query exceeds maximumPoints.,
                    requestId: 019505c8-7c85-7f0b-9bc3-2a3c4d5e6f70,
                  },
              },
          },
      }
    RequiresAsyncProblem:
      {
        description: The requested export is too large for synchronous processing; retry with asynchronous true.,
        content:
          {
            application/problem+json:
              { schema: { $ref: "#/components/schemas/Problem" } },
          },
      }
    NotAcceptable:
      description: Requested response representation is not available
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    InternalServerError:
      description: Unexpected server failure
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    ServiceUnavailableProblem:
      description: A required dependency is unavailable
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
  schemas:
    FreeFormObject:
      type: object
      additionalProperties: true
    OperationalHealth:
      type: object
      additionalProperties: false
      required: [status, detail]
      properties:
        status: { type: string, enum: [ok] }
        detail: { type: string }
        value: { type: integer, format: int64, minimum: 0 }
    PvStringInput:
      type: object
      additionalProperties: false
      required: [name, panelCount, ratedPowerWatts, effectiveFrom]
      properties:
        name: { type: string, minLength: 1 }
        panelCount: { type: integer, minimum: 1 }
        panelManufacturer: { type: [string, "null"] }
        panelModel: { type: [string, "null"] }
        ratedPowerWatts: { type: integer, format: int64, minimum: 1 }
        orientationDegrees: { type: [integer, "null"], minimum: 0, maximum: 359 }
        tiltDegrees: { type: [integer, "null"], minimum: 0, maximum: 90 }
        effectiveFrom: { type: integer, format: int64 }
        effectiveTo: { type: [integer, "null"], format: int64 }
    InverterInput:
      type: object
      additionalProperties: false
      required: [name, effectiveFrom, strings]
      properties:
        name: { type: string, minLength: 1 }
        manufacturer: { type: [string, "null"] }
        model: { type: [string, "null"] }
        serialReference: { type: [string, "null"] }
        ratedPowerWatts: { type: [integer, "null"], format: int64, minimum: 1 }
        effectiveFrom: { type: integer, format: int64 }
        effectiveTo: { type: [integer, "null"], format: int64 }
        strings:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/PvStringInput" }
    PvString:
      allOf:
        - { $ref: "#/components/schemas/PvStringInput" }
        - type: object
          required: [id, inverterId]
          properties:
            id: { $ref: "#/components/schemas/UuidV7" }
            inverterId: { $ref: "#/components/schemas/UuidV7" }
    Inverter:
      allOf:
        - { $ref: "#/components/schemas/InverterInput" }
        - type: object
          required: [id, systemId, version, strings]
          properties:
            id: { $ref: "#/components/schemas/UuidV7" }
            systemId: { $ref: "#/components/schemas/UuidV7" }
            version: { type: integer, minimum: 1 }
            strings:
              type: array
              minItems: 1
              items: { $ref: "#/components/schemas/PvString" }


    CreateInvitation:
      type: object
      additionalProperties: false
      required: [email]
      properties: { email: { type: string, format: email } }
    InvitationCreated:
      type: object
      additionalProperties: false
      required: [invitationId, activationToken, expiresAt]
      properties:
        invitationId: { $ref: "#/components/schemas/UuidV7" }
        activationToken: { type: string, writeOnly: true }
        expiresAt: { type: integer, format: int64 }
    ConnectorAdmin:
      type: object
      additionalProperties: false
      required:
        [id, displayName, protocol, enabled, authorizationEndpoint, scopes]
      properties:
        id: { type: string }
        displayName: { type: string }
        protocol: { enum: [oidc, oauth2] }
        enabled: { type: boolean }
        authorizationEndpoint: { type: [string, "null"], format: uri }
        scopes: { type: array, items: { type: string } }
    AcceptInvitation:
      type: object
      additionalProperties: false
      required: [token, displayName, password]
      properties:
        token: { type: string, writeOnly: true, minLength: 1 }
        displayName: { type: string, minLength: 1 }
        password:
          {
            type: string,
            format: password,
            writeOnly: true,
            minLength: 12,
            maxLength: 128,
          }
    AcceptedResponse:
      type: object
      additionalProperties: false
      required: [status]
      properties: { status: { const: accepted } }
    LocalLogin:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, format: password, writeOnly: true }
    SessionBootstrap:
      type: object
      additionalProperties: false
      required:
        [authenticated, user, accountId, systemIds, permissions, connectors]
      properties:
        authenticated: { type: boolean }
        user:
          oneOf:
            - { $ref: "#/components/schemas/SessionUser" }
            - { type: "null" }
        accountId:
          oneOf:
            - { $ref: "#/components/schemas/UuidV7" }
            - { type: "null" }
        systemIds:
          { type: array, items: { $ref: "#/components/schemas/UuidV7" } }
        permissions: { type: array, items: { type: string } }
        connectors:
          {
            type: array,
            items: { $ref: "#/components/schemas/SessionConnector" },
          }
    SessionUser:
      type: object
      required: [id, displayName]
      properties:
        id: { $ref: "#/components/schemas/UuidV7" }
        displayName: { type: string }
    SessionConnector:
      type: object
      required: [id, name, authorizationUrl]
      properties:
        id: { type: string }
        name: { type: string }
        authorizationUrl: { type: string, format: uri }
    LinkedIdentity:
      type: object
      required:
        [id, connectorId, subject, linkedAtEpochMillis, lastLoginAtEpochMillis]
      properties:
        id: { $ref: "#/components/schemas/UuidV7" }
        connectorId: { $ref: "#/components/schemas/UuidV7" }
        subject: { type: string }
        linkedAtEpochMillis: { type: integer, format: int64 }
        lastLoginAtEpochMillis: { type: [integer, "null"], format: int64 }
    RoleInput:
      type: object
      required: [name, permissions]
      properties:
        name: { type: string, minLength: 1 }
        permissions: { type: array, uniqueItems: true, items: { type: string } }
        parentRoleIds:
          {
            type: array,
            uniqueItems: true,
            items: { $ref: "#/components/schemas/UuidV7" },
          }
    Role:
      allOf:
        - { $ref: "#/components/schemas/RoleInput" }
        - type: object
          required: [id, kind, version, createdAt, updatedAt]
          properties:
            id: { $ref: "#/components/schemas/UuidV7" }
            kind: { type: string }
            version: { type: integer, minimum: 1 }
            createdAt: { type: integer, format: int64 }
            updatedAt: { type: integer, format: int64 }
    RoleAssignmentInput:
      type: object
      required: [roleId, principalType, principalId]
      properties:
        roleId: { $ref: "#/components/schemas/UuidV7" }
        principalType: { enum: [user, api_credential] }
        principalId: { $ref: "#/components/schemas/UuidV7" }
        systemId: { $ref: "#/components/schemas/UuidV7" }
        expiresAt: { type: integer, format: int64 }
    RoleAssignment:
      allOf:
        - { $ref: "#/components/schemas/RoleAssignmentInput" }
        - type: object
          required: [id, accountId]
          properties:
            id: { $ref: "#/components/schemas/UuidV7" }
            accountId: { $ref: "#/components/schemas/UuidV7" }
    AuditEvent:
      type: object
      required:
        [
          id,
          occurredAt,
          actorType,
          actorId,
          action,
          targetType,
          targetId,
          outcome,
          safeMetadata,
        ]
      properties:
        id: { $ref: "#/components/schemas/UuidV7" }
        occurredAt: { type: integer, format: int64 }
        actorType: { type: string }
        actorId: { type: [string, "null"], format: uuid }
        action: { type: string }
        targetType: { type: string }
        targetId: { type: [string, "null"], format: uuid }
        outcome: { type: string }
        safeMetadata: { type: object, additionalProperties: true }
    AlertRuleInput:
      type: object
      required: [name, kind, timezone, enabled]
      properties:
        name: { type: string, minLength: 1 }
        kind:
          {
            type: string,
            enum:
              [
                idle,
                generation_below,
                consumption_above,
                net_power_above,
                standby_cost_above,
                performance_below,
                battery_below,
                extended_below,
                extended_above,
              ],
          }
        timezone: { type: string, example: Europe/Berlin }
        enabled: { type: boolean }
        condition: { type: object, additionalProperties: true }
    AlertRule:
      allOf:
        - { $ref: "#/components/schemas/AlertRuleInput" }
        - {
            type: object,
            required: [id],
            properties: { id: { $ref: "#/components/schemas/UuidV7" } },
          }
    AlertEvent:
      type: object
      required: [id, ruleId, state, openedAtEpochMillis]
      properties:
        id: { $ref: "#/components/schemas/UuidV7" }
        ruleId: { $ref: "#/components/schemas/UuidV7" }
        state: { type: string, enum: [open, acknowledged, resolved] }
        openedAtEpochMillis: { type: integer, format: int64 }
        resolvedAtEpochMillis: { type: [integer, "null"], format: int64 }
    WebhookInput:
      type: object
      required: [endpoint, events]
      properties:
        endpoint: { type: string, format: uri, pattern: "^https://" }
        events:
          {
            type: array,
            uniqueItems: true,
            items:
              {
                type: string,
                enum:
                  [
                    observation_accepted,
                    alert_opened,
                    alert_resolved,
                    system_changed,
                    export_ready,
                  ],
              },
          }
    WebhookSubscription:
      allOf:
        - { $ref: "#/components/schemas/WebhookInput" }
        - {
            type: object,
            required: [id, state],
            properties:
              {
                id: { $ref: "#/components/schemas/UuidV7" },
                state:
                  {
                    type: string,
                    enum: [pending_verification, active, disabled],
                  },
                challenge: { type: string, writeOnly: true },
              },
          }
    WebhookEvent:
      type: object
      required:
        [schema_version, event_id, event_type, occurred_at_epoch_millis, data]
      properties:
        schema_version: { type: integer, const: 1 }
        event_id: { type: string, format: uuid }
        event_type: { type: string }
        occurred_at_epoch_millis: { type: integer, format: int64 }
        data: { type: object, additionalProperties: true }
    WebhookAttempt:
      type: object
      required: [attemptedAtEpochMillis]
      properties:
        attemptedAtEpochMillis: { type: integer, format: int64 }
        responseStatus: { type: [integer, "null"], minimum: 100, maximum: 599 }
        errorClass: { type: [string, "null"] }
        durationMilliseconds: { type: integer, minimum: 0 }
    CreateSystem:
      type: object
      required: [accountId, name, timezone]
      properties:
        {
          accountId: { $ref: "#/components/schemas/UuidV7" },
          name: { type: string, minLength: 1 },
          timezone: { type: string, example: Europe/Berlin },
        }
    UpdateSystem:
      type: object
      required: [name, timezone, visibility]
      properties:
        {
          name: { type: string, minLength: 1 },
          timezone: { type: string },
          visibility: { enum: [private, account, unlisted, public] },
        }
    System:
      allOf:
        - $ref: "#/components/schemas/UpdateSystem"
        - type: object
          required: [id, accountId, lifecycle, version]
          properties:
            {
              id: { $ref: "#/components/schemas/UuidV7" },
              accountId: { $ref: "#/components/schemas/UuidV7" },
              lifecycle: { enum: [active, archived, pending_deletion] },
              version: { type: integer, minimum: 1 },
            }
    ManagedResource:
      type: object
      required: [id, accountId, kind, version, attributes]
      properties:
        {
          id: { $ref: "#/components/schemas/UuidV7" },
          accountId: { $ref: "#/components/schemas/UuidV7" },
          systemId: { $ref: "#/components/schemas/UuidV7" },
          kind: { enum: [equipment, tariff, channel, membership, credential] },
          version: { type: integer, minimum: 1 },
          attributes: { type: object, additionalProperties: true },
        }
    ObservationInput:
      type: object
      required: [observedAtEpochMillis]
      properties:
        {
          observedAtEpochMillis: { type: integer },
          generationPowerWatts: { type: integer },
          generationEnergyWh: { type: integer },
          consumptionPowerWatts: { type: integer },
          consumptionEnergyWh: { type: integer },
          voltageMillivolts: { type: integer, minimum: 0 },
          temperatureMillidegreesCelsius: { type: integer },
          sourceReference: { type: string },
        }
    ObservationBatchInput:
      type: object
      required: [mode, items]
      properties:
        {
          mode: { enum: [atomic, partial] },
          items:
            {
              type: array,
              minItems: 1,
              maxItems: 1000,
              items:
                {
                  allOf:
                    [
                      { $ref: "#/components/schemas/ObservationInput" },
                      {
                        type: object,
                        required: [idempotencyKey],
                        properties:
                          { idempotencyKey: { type: string, minLength: 1 } },
                      },
                    ],
                },
            },
        }
    SeriesQueryResult:
      type: object
      additionalProperties: false
      required: [actualResolution, timezone, series]
      properties:
        actualResolution:
          { enum: [raw, fifteen_minutes, hourly, daily, monthly, yearly] }
        timezone:
          {
            type: string,
            description: IANA timezone used for calendar bucket boundaries.,
          }
        series: { type: array, items: { $ref: "#/components/schemas/Series" } }
    Series:
      type: object
      additionalProperties: false
      required: [field, unit, points, gaps]
      properties:
        field:
          {
            enum:
              [
                generation_power,
                generation_energy,
                consumption_power,
                consumption_energy,
                grid_power,
                battery_power,
                battery_state_of_charge,
                temperature,
                extended,
                provenance,
              ],
          }
        unit:
          {
            enum:
              [watts, watt_hours, basis_points, milli_degrees_celsius, integer],
          }
        points:
          { type: array, items: { $ref: "#/components/schemas/SeriesPoint" } }
        gaps: { type: array, items: { $ref: "#/components/schemas/SeriesGap" } }
    SeriesPoint:
      type: object
      additionalProperties: false
      required: [timestampEpochMillis, value, coverageBasisPoints, qualityFlags]
      properties:
        timestampEpochMillis: { type: integer, format: int64 }
        value: { type: integer, format: int64 }
        coverageBasisPoints: { type: integer, minimum: 0, maximum: 10000 }
        qualityFlags: { type: integer, minimum: 0 }
        provenance:
          {
            type: [string, "null"],
            description: Present only for corrected raw points.,
          }
    SeriesGap:
      type: object
      additionalProperties: false
      required: [startEpochMillis, endEpochMillis, kind]
      properties:
        startEpochMillis: { type: integer, format: int64 }
        endEpochMillis: { type: integer, format: int64 }
        kind: { enum: [missing, suspect, incomplete_coverage] }
    EnergyStatistics:
      type: object
      required: [period, coverageBasisPoints]
      properties:
        period: { enum: [daily, monthly, yearly, lifetime] }
        generationWh: { type: [integer, "null"], minimum: 0 }
        consumptionWh: { type: [integer, "null"], minimum: 0 }
        gridImportWh: { type: [integer, "null"], minimum: 0 }
        gridExportWh: { type: [integer, "null"], minimum: 0 }
        selfConsumptionWh: { type: [integer, "null"], minimum: 0 }
        efficiencyWhPerKw: { type: [integer, "null"], minimum: 0 }
        peakGenerationWatts: { type: [integer, "null"] }
        minimumTemperatureMilliCelsius: { type: [integer, "null"] }
        maximumTemperatureMilliCelsius: { type: [integer, "null"] }
        batteryChargeWh: { type: [integer, "null"], minimum: 0 }
        batteryDischargeWh: { type: [integer, "null"], minimum: 0 }
        minimumBatteryBasisPoints:
          { type: [integer, "null"], minimum: 0, maximum: 10000 }
        maximumBatteryBasisPoints:
          { type: [integer, "null"], minimum: 0, maximum: 10000 }
        revenueMinorUnits: { type: [integer, "null"] }
        costMinorUnits: { type: [integer, "null"] }
        netFinancialMinorUnits: { type: [integer, "null"] }
        coverageBasisPoints: { type: integer, minimum: 0, maximum: 10000 }
    DataQualityIssue:
      type: object
      additionalProperties: false
      required: [kind, startEpochMillis, endEpochMillis, sourceReferences]
      properties:
        kind:
          {
            enum:
              [
                missing_interval,
                suspect_observation,
                source_conflict,
                counter_reset,
                rejected_ingestion,
                aggregate_lag,
              ],
          }
        startEpochMillis: { type: integer, format: int64 }
        endEpochMillis: { type: integer, format: int64 }
        sourceReferences: { type: array, items: { type: string } }
        reasonCode: { type: [string, "null"] }
    ComparisonMetric: { enum: [total_generation, normalized_generation] }
    ComparisonRequest:
      type: object
      additionalProperties: false
      required: [systemIds, metric]
      properties:
        systemIds:
          {
            type: array,
            minItems: 2,
            maxItems: 20,
            uniqueItems: true,
            items: { $ref: "#/components/schemas/UuidV7" },
          }
        metric: { $ref: "#/components/schemas/ComparisonMetric" }
    ComparisonEntry:
      type: object
      additionalProperties: false
      required:
        [
          rank,
          systemId,
          displayName,
          totalGenerationWh,
          normalizedGenerationWhPerKw,
          coverageBasisPoints,
          tied,
          projectionAgeMillis,
        ]
      properties:
        rank: { type: integer, minimum: 1 }
        systemId: { $ref: "#/components/schemas/UuidV7" }
        displayName: { type: string }
        totalGenerationWh: { type: integer, minimum: 0 }
        normalizedGenerationWhPerKw: { type: integer, minimum: 0 }
        coverageBasisPoints: { type: integer, minimum: 0, maximum: 10000 }
        tied: { type: boolean }
        projectionAgeMillis: { type: integer, minimum: 0 }
    AnalysisExportRequest:
      type: object
      additionalProperties: false
      required: [startEpochMillis, endEpochMillis, fields, format]
      properties:
        startEpochMillis: { type: integer, format: int64 }
        endEpochMillis: { type: integer, format: int64 }
        fields:
          {
            type: array,
            minItems: 1,
            uniqueItems: true,
            items: { type: string },
          }
        resolution:
          { enum: [auto, raw, 15m, hour, day, month, year], default: auto }
        timezone: { type: string, default: UTC }
        maximumPoints:
          { type: integer, minimum: 1, maximum: 10000, default: 2000 }
        format: { enum: [csv, json] }
        asynchronous: { type: boolean, default: false }
    QueuedJob:
      type: object
      additionalProperties: false
      required: [jobId]
      properties: { jobId: { $ref: "#/components/schemas/UuidV7" } }
    UuidV7:
      type: string
      format: uuid
      pattern: "^[0-9a-f]{8}-[0-9a-f]{4}-7[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$"
      description: >-
        Canonical lowercase UUID version 7 generated by PVLog. Treat this value
        as opaque; its time-sortable bits do not grant authority or establish an
        authoritative creation timestamp.
      examples:
        - 019505c8-7c85-7f0b-9bc3-2a3c4d5e6f70
    HealthStatus:
      type: object
      additionalProperties: false
      required:
        - status
        - service
        - version
      properties:
        status:
          type: string
          const: ok
          description: Liveness result.
        service:
          type: string
          description: Process service name.
          examples:
            - pvlog
        version:
          type: string
          description: Running application version.
          examples:
            - 0.1.0
    ReadinessStatus:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status: { const: ok }
    Problem:
      type: object
      additionalProperties: true
      description: RFC 9457 problem details.
      required:
        - type
        - title
        - status
        - requestId
      properties:
        type:
          type: string
          format: uri-reference
          description: Stable problem type identifier.
        title:
          type: string
          description: Short human-readable problem title.
        status:
          type: integer
          minimum: 400
          maximum: 599
          description: HTTP status code.
        detail:
          type: string
          description: Safe occurrence-specific explanation.
        requestId:
          $ref: "#/components/schemas/UuidV7"
