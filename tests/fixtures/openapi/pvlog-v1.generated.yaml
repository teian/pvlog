  /api/v1/systems/{system_id}/series:
    parameters:
      - $ref: "#/components/parameters/NestedSystemId"
      - $ref: "#/components/parameters/StartEpochMillis"
      - $ref: "#/components/parameters/EndEpochMillis"
      - $ref: "#/components/parameters/SeriesFields"
      - $ref: "#/components/parameters/SeriesResolution"
      - $ref: "#/components/parameters/Timezone"
      - $ref: "#/components/parameters/MaximumPoints"
      - $ref: "#/components/parameters/IfNoneMatch"
    get:
      operationId: getSystemSeries
      summary: Query bounded system time series
      description: >-
        Returns corrected raw observations or the finest available rollup that
        stays within maximumPoints. Calendar resolutions use the requested IANA
        timezone, so DST days may contain 23 or 25 hours. Raw requests are never
        silently replaced with aggregates.
      tags: [Analytics]
      security: [{ bearerAuth: [analytics:read] }]
      responses:
        "200":
          description: Resolution-aware multi-series result
          headers:
            ETag:
              {
                schema: { type: string },
                description: Validator for the query and source generations.,
              }
            Last-Modified: { schema: { type: string, format: http-date } }
            Vary: { schema: { type: string }, example: "Accept, Authorization" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SeriesQueryResult" }
              examples:
                dstDay:
                  summary: Europe/Berlin spring DST day
                  value:
                    actualResolution: hourly
                    timezone: Europe/Berlin
                    series:
                      - field: generation_power
                        unit: watts
                        points:
                          - {
                              timestampEpochMillis: 1774738800000,
                              value: 4200,
                              coverageBasisPoints: 10000,
                              qualityFlags: 0,
                            }
                        gaps: []
        "304": { description: The query result has not changed. }
        "403": { $ref: "#/components/responses/ForbiddenProblem" }
        "422": { $ref: "#/components/responses/QueryProblem" }
