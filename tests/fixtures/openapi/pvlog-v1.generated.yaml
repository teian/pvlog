  /api/v1/systems/{system_id}/inverters:
    parameters: [{ $ref: "#/components/parameters/NestedSystemId" }]
    get:
      operationId: listInverters
      summary: List effective inverter aggregates
      description: Lists inverters and their effective PV strings for one system.
      tags: [Systems]
      security: [{ bearerAuth: [systems:read] }]
      responses:
        "200":
          description: Effective inverter aggregates.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Inverter" }
        "403": { $ref: "#/components/responses/ForbiddenProblem" }
    post:
      operationId: createInverter
      summary: Create an inverter aggregate
      description: Atomically creates one inverter and its complete PV-string subtree. Catalog snapshots are editable copies; their values may differ from the optional template reference and never update automatically.
      tags: [Systems]
      security: [{ bearerAuth: [systems:write] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/InverterInput" }
            examples:
              manualEquipment:
                summary: Fully manual equipment remains supported
                value:
                  name: Roof inverter
                  manufacturer: Custom Manufacturer
                  model: Site-confirmed model
                  ratedPowerWatts: 8000
                  valueProvenance: manual
                  effectiveFrom: 1783814400000
                  strings:
                    - name: South roof
                      panelCount: 18
                      panelManufacturer: Custom Modules
                      panelModel: CM-450
                      modulePeakPowerWatts: 450
                      effectiveFrom: 1783814400000
              editableCatalogSnapshot:
                summary: Catalog-prefilled values are confirmed snapshots and may be edited
                value:
                  name: Roof inverter
                  manufacturer: Fronius
                  model: Symo GEN24 10.0
                  ratedPowerWatts: 10000
                  valueProvenance: catalog_customized
                  specificationSnapshot:
                    manufacturer: Fronius
                    model: Symo GEN24 10.0 site setting
                    dc:
                      {
                        totalStringInputCount: 3,
                        mpptInputs:
                          [
                            { trackerIndex: 1, stringInputCount: 2 },
                            { trackerIndex: 2, stringInputCount: 1 },
                          ],
                      }
                    ac: { phaseCount: 3, ratedActivePowerWatts: 10000 }
                    operational: {}
                    template:
                      {
                        entryId: fronius-symo-gen24-10-0,
                        revision: 2026.07.11.1,
                        valueProvenance: catalog_customized,
                      }
                  effectiveFrom: 1783814400000
                  strings:
                    - name: South roof
                      panelCount: 18
                      panelManufacturer: JA Solar
                      panelModel: JAM54D40-450/LB
                      modulePeakPowerWatts: 450
                      effectiveFrom: 1783814400000
      responses:
        "201":
          description: Inverter aggregate created.
          headers:
            ETag: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Inverter" }
        "403": { $ref: "#/components/responses/ForbiddenProblem" }
        "422": { $ref: "#/components/responses/ValidationProblem" }

