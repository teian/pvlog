  /api/v1/systems/{system_id}/analysis-exports:
    parameters: [{ $ref: "#/components/parameters/NestedSystemId" }]
    post:
      operationId: createAnalysisExport
      summary: Export an analysis query as CSV or JSON
      description: >-
        Returns a bounded export synchronously or queues a durable job. CSV uses
        stable half-open interval columns and preserves units, lower/central/upper
        estimates, model and configuration versions, coverage, uncertainty,
        freshness, and provider attribution for modeled fields.
      tags: [Exports]
      security: [{ bearerAuth: [exports:write] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AnalysisExportRequest" }
            examples:
              csv:
                value:
                  {
                    startEpochMillis: 1774738800000,
                    endEpochMillis: 1774821600000,
                    fields: [generation_power, consumption_power],
                    resolution: hour,
                    timezone: Europe/Berlin,
                    maximumPoints: 2000,
                    format: csv,
                    asynchronous: false,
                  }
              modeledCsv:
                value:
                  startEpochMillis: 1780000000000
                  endEpochMillis: 1780086400000
                  fields:
                    [
                      forecast_power,
                      forecast_energy,
                      generation_energy,
                      expected_energy,
                      generation_performance,
                      forecast_realization,
                    ]
                  resolution: hour
                  timezone: UTC
                  maximumPoints: 48
                  format: csv
                  asynchronous: false
                  includePartial: true
              queuedJson:
                value:
                  {
                    startEpochMillis: 990000000000,
                    endEpochMillis: 1780000000000,
                    fields: [generation_energy],
                    resolution: day,
                    timezone: UTC,
                    maximumPoints: 10000,
                    format: json,
                    asynchronous: true,
                  }
      responses:
        "200":
          description: Synchronous export artifact
          headers:
            Content-Disposition:
              {
                schema: { type: string },
                example: attachment; filename="generation.csv",
              }
            X-PVLog-Weather-Run-Id:
              { schema: { $ref: "#/components/schemas/UuidV7" } }
            X-PVLog-Calculation-Run-Id:
              { schema: { $ref: "#/components/schemas/UuidV7" } }
            X-PVLog-Model-Version:
              { schema: { type: string }, example: pvwatts-compatible@1 }
            X-PVLog-Coverage-Basis-Points:
              { schema: { type: integer, minimum: 0, maximum: 10000 } }
            X-PVLog-Uncertainty-Available: { schema: { type: boolean } }
            X-PVLog-Interval-Semantics: { schema: { const: half_open } }
            X-PVLog-Provider-Attribution: { schema: { type: string } }
          content:
            text/csv:
              schema: { type: string }
              examples:
                telemetry:
                  value: |-
                    timestamp_epoch_millis,field,value,unit,coverage_basis_points,quality_flags,resolution,timezone
                    1774738800000,generation_power,4200,watts,10000,0,hour,Europe/Berlin
                modeled:
                  value: |-
                    interval_start,interval_end,forecast_power_watts,forecast_power_lower_watts,forecast_power_upper_watts,forecast_energy_watt_hours,actual_energy_watt_hours,expected_energy_watt_hours,generation_performance_basis_points,forecast_realization_basis_points,coverage_basis_points,model_version,provider_attribution
            application/json:
              schema: { $ref: "#/components/schemas/SeriesQueryResult" }
        "202":
          description: Export job accepted
          headers:
            {
              Location:
                {
                  schema: { type: string, format: uri-reference },
                  example: /api/v1/jobs/019505c8-7c85-7f0b-9bc3-2a3c4d5e6f72,
                },
            }
          content:
            {
              application/json:
                {
                  schema: { $ref: "#/components/schemas/QueuedJob" },
                  example: { jobId: 019505c8-7c85-7f0b-9bc3-2a3c4d5e6f72 },
                },
            }
        "413": { $ref: "#/components/responses/RequiresAsyncProblem" }
        "422": { $ref: "#/components/responses/QueryProblem" }
