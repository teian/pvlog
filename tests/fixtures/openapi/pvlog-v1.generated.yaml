openapi: 3.1.1
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
info:
  title: PVLog REST API
  version: 0.1.0
  summary: Modern self-hosted photovoltaic monitoring API
  description: >-
    The versioned JSON contract for PVLog. PVOutput r2 compatibility endpoints
    are documented separately because they use legacy form and CSV formats.
  license:
    name: Apache License 2.0
    identifier: Apache-2.0
servers:
  - url: /
    description: Current PVLog installation
tags:
  - name: Operations
    description: Process and deployment health
  - name: Systems
    description: PV system lifecycle and account-owned configuration
  - name: Telemetry
    description: Canonical observation ingestion and correction
  - name: Analytics
    description: Resolution-aware time series, statistics, and data quality
  - name: Community
    description: Privacy-safe comparisons and ladders
  - name: Exports
    description: Synchronous and asynchronous analysis exports
paths:
  /api/v1/health/live:
    get:
      operationId: getLiveness
      summary: Check process liveness
      description: Confirms that the HTTP process can execute requests.
      tags:
        - Operations
      security: []
      responses:
        "200":
          description: Process is live
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              examples:
                live:
                  summary: Live process
                  value:
                    status: ok
                    service: pvlog
                    version: 0.1.0
        "406":
          $ref: "#/components/responses/NotAcceptable"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/systems:
    post:
      operationId: createSystem
      tags: [Systems]
      summary: Create a private PV system
      description: Creates one account-owned system using private and active defaults.
      security: [{ bearerAuth: [systems:write] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateSystem" }
            example: { accountId: 019505c8-7c85-7f0b-9bc3-2a3c4d5e6f70, name: Roof PV, timezone: Europe/Berlin }
      responses:
        "201": { $ref: "#/components/responses/SystemResponse" }
        "422": { $ref: "#/components/responses/ValidationProblem" }
  /api/v1/systems/{id}:
    parameters:
      - $ref: "#/components/parameters/SystemId"
    put:
      operationId: updateSystem
      tags: [Systems]
      summary: Update a PV system
      description: Replaces mutable system settings when the supplied ETag is current.
      security: [{ bearerAuth: [systems:write] }]
      parameters: [{ $ref: "#/components/parameters/IfMatch" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateSystem" }
      responses:
        "200": { $ref: "#/components/responses/SystemResponse" }
        "412": { $ref: "#/components/responses/PreconditionProblem" }
    delete:
      operationId: deleteSystem
      tags: [Systems]
      summary: Permanently delete a PV system
      description: Starts confirmed permanent deletion when the supplied ETag is current.
      security: [{ bearerAuth: [systems:write] }]
      parameters:
        - $ref: "#/components/parameters/IfMatch"
        - { name: X-Confirm-Delete, in: header, required: true, schema: { type: boolean } }
      responses:
        "204": { description: System deletion accepted }
        "412": { $ref: "#/components/responses/PreconditionProblem" }
  /api/v1/systems/{id}/archive:
    post:
      operationId: archiveSystem
      tags: [Systems]
      summary: Archive a PV system
      description: Makes an active system inactive without deleting its stored data.
      security: [{ bearerAuth: [systems:write] }]
      parameters:
        - $ref: "#/components/parameters/SystemId"
        - $ref: "#/components/parameters/IfMatch"
      responses: { "200": { $ref: "#/components/responses/SystemResponse" }, "412": { $ref: "#/components/responses/PreconditionProblem" } }
  /api/v1/systems/{id}/restore:
    post:
      operationId: restoreSystem
      tags: [Systems]
      summary: Restore a PV system
      description: Returns an archived system to active service.
      security: [{ bearerAuth: [systems:write] }]
      parameters:
        - $ref: "#/components/parameters/SystemId"
        - $ref: "#/components/parameters/IfMatch"
      responses: { "200": { $ref: "#/components/responses/SystemResponse" }, "412": { $ref: "#/components/responses/PreconditionProblem" } }
  /api/v1/accounts/{account_id}/systems/{system_id}/equipment:
    parameters: [{ $ref: "#/components/parameters/AccountId" }, { $ref: "#/components/parameters/NestedSystemId" }]
    get: { operationId: listEquipment, summary: List equipment, description: Lists effective-dated equipment for one system., tags: [Systems], security: [{ bearerAuth: [systems:read] }], responses: { "200": { $ref: "#/components/responses/ResourceList" }, "403": { $ref: "#/components/responses/ForbiddenProblem" } } }
    post: { operationId: createEquipment, summary: Create equipment, description: Adds validated effective-dated equipment to one system., tags: [Systems], security: [{ bearerAuth: [systems:write] }], requestBody: { $ref: "#/components/requestBodies/ManagedResource" }, responses: { "201": { $ref: "#/components/responses/ManagedResource" }, "403": { $ref: "#/components/responses/ForbiddenProblem" } } }
  /api/v1/accounts/{account_id}/systems/{system_id}/tariffs:
    parameters: [{ $ref: "#/components/parameters/AccountId" }, { $ref: "#/components/parameters/NestedSystemId" }]
    get: { operationId: listTariffs, summary: List tariffs, description: Lists effective-dated tariffs for one system., tags: [Systems], security: [{ bearerAuth: [systems:read] }], responses: { "200": { $ref: "#/components/responses/ResourceList" }, "403": { $ref: "#/components/responses/ForbiddenProblem" } } }
    post: { operationId: createTariff, summary: Create tariff, description: Adds a validated effective-dated tariff to one system., tags: [Systems], security: [{ bearerAuth: [systems:write] }], requestBody: { $ref: "#/components/requestBodies/ManagedResource" }, responses: { "201": { $ref: "#/components/responses/ManagedResource" }, "403": { $ref: "#/components/responses/ForbiddenProblem" } } }
  /api/v1/accounts/{account_id}/systems/{system_id}/channels:
    parameters: [{ $ref: "#/components/parameters/AccountId" }, { $ref: "#/components/parameters/NestedSystemId" }]
    get: { operationId: listChannels, summary: List channels, description: Lists typed extended channels for one system., tags: [Systems], security: [{ bearerAuth: [systems:read] }], responses: { "200": { $ref: "#/components/responses/ResourceList" }, "403": { $ref: "#/components/responses/ForbiddenProblem" } } }
    post: { operationId: createChannel, summary: Create channel, description: Adds a validated typed extended channel to one system., tags: [Systems], security: [{ bearerAuth: [systems:write] }], requestBody: { $ref: "#/components/requestBodies/ManagedResource" }, responses: { "201": { $ref: "#/components/responses/ManagedResource" }, "403": { $ref: "#/components/responses/ForbiddenProblem" } } }
  /api/v1/accounts/{account_id}/memberships:
    parameters: [{ $ref: "#/components/parameters/AccountId" }]
    get: { operationId: listMemberships, summary: List memberships, description: Lists authorized memberships in one account., tags: [Systems], security: [{ bearerAuth: [systems:read] }], responses: { "200": { $ref: "#/components/responses/ResourceList" }, "403": { $ref: "#/components/responses/ForbiddenProblem" } } }
    post: { operationId: createMembership, summary: Create membership, description: Adds a validated membership to one account., tags: [Systems], security: [{ bearerAuth: [systems:write] }], requestBody: { $ref: "#/components/requestBodies/ManagedResource" }, responses: { "201": { $ref: "#/components/responses/ManagedResource" }, "403": { $ref: "#/components/responses/ForbiddenProblem" } } }
  /api/v1/accounts/{account_id}/credentials:
    parameters: [{ $ref: "#/components/parameters/AccountId" }]
    get: { operationId: listCredentials, summary: List credentials, description: Lists non-secret credential metadata in one account., tags: [Systems], security: [{ bearerAuth: [systems:read] }], responses: { "200": { $ref: "#/components/responses/ResourceList" }, "403": { $ref: "#/components/responses/ForbiddenProblem" } } }
    post: { operationId: createCredential, summary: Create credential, description: Creates a scoped credential and returns its secret only once., tags: [Systems], security: [{ bearerAuth: [systems:write] }], requestBody: { $ref: "#/components/requestBodies/ManagedResource" }, responses: { "201": { $ref: "#/components/responses/ManagedResource" }, "403": { $ref: "#/components/responses/ForbiddenProblem" } } }
  /api/v1/systems/{system_id}/observations:
    parameters: [{ $ref: "#/components/parameters/NestedSystemId" }]
    post:
      operationId: createObservation
      summary: Ingest one observation
      description: Normalizes and durably stores one idempotent canonical observation.
      tags: [Telemetry]
      security: [{ bearerAuth: [telemetry:write] }]
      parameters: [{ name: Idempotency-Key, in: header, required: true, schema: { type: string, minLength: 1 } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/ObservationInput" }, example: { observedAtEpochMillis: 1780000000000, generationPowerWatts: 4200, generationEnergyWh: 350 } } } }
      responses: { "201": { description: Observation accepted, content: { application/json: { schema: { type: object } } } }, "422": { $ref: "#/components/responses/ValidationProblem" }, "503": { $ref: "#/components/responses/OverloadProblem" } }
  /api/v1/systems/{system_id}/observations/batch:
    parameters: [{ $ref: "#/components/parameters/NestedSystemId" }]
    post:
      operationId: createObservationBatch
      summary: Ingest an observation batch
      description: Processes a bounded batch in atomic or partial-result mode.
      tags: [Telemetry]
      security: [{ bearerAuth: [telemetry:write] }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/ObservationBatchInput" } } } }
      responses: { "200": { description: Stable indexed batch outcomes, content: { application/json: { schema: { type: object } } } }, "422": { $ref: "#/components/responses/ValidationProblem" }, "503": { $ref: "#/components/responses/OverloadProblem" } }
  /api/v1/systems/{system_id}/observations/{observation_id}:
    parameters: [{ $ref: "#/components/parameters/NestedSystemId" }, { $ref: "#/components/parameters/ObservationId" }]
    patch:
      operationId: correctObservation
      summary: Correct an observation
      description: Applies an optimistic replacement or deletion overlay and schedules reconciliation.
      tags: [Telemetry]
      security: [{ bearerAuth: [telemetry:write] }]
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [expectedVersion, reason, delete], properties: { expectedVersion: { type: integer, minimum: 1 }, reason: { type: string, minLength: 1 }, generationPowerWatts: { type: integer }, delete: { type: boolean } } } } } }
      responses: { "200": { description: Immediately visible merged observation, content: { application/json: { schema: { type: object } } } }, "409": { $ref: "#/components/responses/ConflictProblem" } }
    delete:
      operationId: deleteObservation
      summary: Delete an observation
      description: Records an optimistic deletion while preserving audit and reconciliation history.
      tags: [Telemetry]
      security: [{ bearerAuth: [telemetry:write] }]
      parameters: [{ $ref: "#/components/parameters/IfMatch" }, { name: X-Correction-Reason, in: header, required: true, schema: { type: string, minLength: 1 } }]
      responses: { "204": { description: Deletion accepted }, "409": { $ref: "#/components/responses/ConflictProblem" } }
  /api/v1/systems/{system_id}/series:
    parameters:
      - $ref: "#/components/parameters/NestedSystemId"
      - $ref: "#/components/parameters/StartEpochMillis"
      - $ref: "#/components/parameters/EndEpochMillis"
      - $ref: "#/components/parameters/SeriesFields"
      - $ref: "#/components/parameters/SeriesResolution"
      - $ref: "#/components/parameters/Timezone"
      - $ref: "#/components/parameters/MaximumPoints"
      - $ref: "#/components/parameters/IfNoneMatch"
    get:
      operationId: getSystemSeries
      summary: Query bounded system time series
      description: >-
        Returns corrected raw observations or the finest available rollup that
        stays within maximumPoints. Calendar resolutions use the requested IANA
        timezone, so DST days may contain 23 or 25 hours. Raw requests are never
        silently replaced with aggregates.
      tags: [Analytics]
      security: [{ bearerAuth: [analytics:read] }]
      responses:
        "200":
          description: Resolution-aware multi-series result
          headers:
            ETag: { schema: { type: string }, description: Validator for the query and source generations. }
            Last-Modified: { schema: { type: string, format: http-date } }
            Vary: { schema: { type: string }, example: "Accept, Authorization" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SeriesQueryResult" }
              examples:
                dstDay:
                  summary: Europe/Berlin spring DST day
                  value:
                    actualResolution: hourly
                    timezone: Europe/Berlin
                    series:
                      - field: generation_power
                        unit: watts
                        points:
                          - { timestampEpochMillis: 1774738800000, value: 4200, coverageBasisPoints: 10000, qualityFlags: 0 }
                        gaps: []
        "304": { description: The query result has not changed. }
        "403": { $ref: "#/components/responses/ForbiddenProblem" }
        "422": { $ref: "#/components/responses/QueryProblem" }
  /api/v1/systems/{system_id}/statistics:
    parameters:
      - $ref: "#/components/parameters/NestedSystemId"
      - name: period
        in: query
        required: true
        schema: { enum: [day, month, year, lifetime] }
      - $ref: "#/components/parameters/IfNoneMatch"
    get:
      operationId: getSystemStatistics
      summary: Get period energy statistics
      description: Returns available energy, grid, efficiency, peak, environmental, battery, financial, and coverage statistics without replacing unavailable fields with zero.
      tags: [Analytics]
      security: [{ bearerAuth: [analytics:read] }]
      responses:
        "200":
          description: Period statistics
          headers: { ETag: { schema: { type: string } }, Last-Modified: { schema: { type: string, format: http-date } } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EnergyStatistics" }
              example: { period: daily, generationWh: 18400, consumptionWh: 12100, gridImportWh: 2400, gridExportWh: 8700, efficiencyWhPerKw: 3066, peakGenerationWatts: 5800, coverageBasisPoints: 9850 }
        "304": { description: Statistics have not changed. }
        "422": { $ref: "#/components/responses/QueryProblem" }
  /api/v1/systems/{system_id}/data-quality:
    parameters:
      - $ref: "#/components/parameters/NestedSystemId"
      - $ref: "#/components/parameters/StartEpochMillis"
      - $ref: "#/components/parameters/EndEpochMillis"
    get:
      operationId: getSystemDataQuality
      summary: List missing and suspect data intervals
      description: Reports missing intervals, suspect observations, source conflicts, counter resets, rejected ingestion, and aggregate lag without fabricating raw points.
      tags: [Analytics]
      security: [{ bearerAuth: [analytics:read] }]
      responses:
        "200":
          description: Ordered data-quality issues
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/DataQualityIssue" } }
              example:
                - { kind: missing_interval, startEpochMillis: 1780000000000, endEpochMillis: 1780001800000, sourceReferences: [], reasonCode: not_reported }
        "422": { $ref: "#/components/responses/QueryProblem" }
  /api/v1/comparisons:
    post:
      operationId: compareSystems
      summary: Compare visible systems
      description: Compares between 2 and 20 authorized or public systems with effective-capacity normalization, coverage, privacy, and deterministic tie semantics.
      tags: [Community]
      security: [{ bearerAuth: [community:read] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ComparisonRequest" }
            example: { systemIds: [019505c8-7c85-7f0b-9bc3-2a3c4d5e6f70, 019505c8-7c85-7f0b-9bc3-2a3c4d5e6f71], metric: normalized_generation }
      responses:
        "200": { description: Ranked comparison, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/ComparisonEntry" } } } } }
        "403": { $ref: "#/components/responses/ForbiddenProblem" }
        "422": { $ref: "#/components/responses/QueryProblem" }
  /api/v1/ladders:
    get:
      operationId: getLadder
      summary: Get a public or team ladder
      description: Returns eligible public systems ordered by the selected metric with competition ranks such as 1, 1, 3 and projection freshness metadata.
      tags: [Community]
      security: [{ bearerAuth: [community:read] }]
      parameters:
        - name: teamId
          in: query
          schema: { $ref: "#/components/schemas/UuidV7" }
        - name: metric
          in: query
          schema: { $ref: "#/components/schemas/ComparisonMetric", default: normalized_generation }
        - $ref: "#/components/parameters/IfNoneMatch"
      responses:
        "200":
          description: Ladder entries
          headers: { ETag: { schema: { type: string } }, Last-Modified: { schema: { type: string, format: http-date } } }
          content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/ComparisonEntry" } } } }
        "304": { description: Ladder projections have not changed. }
        "422": { $ref: "#/components/responses/QueryProblem" }
  /api/v1/systems/{system_id}/analysis-exports:
    parameters: [{ $ref: "#/components/parameters/NestedSystemId" }]
    post:
      operationId: createAnalysisExport
      summary: Export an analysis query as CSV or JSON
      description: >-
        Returns a bounded export synchronously or queues a durable job. CSV uses
        stable headers timestamp_epoch_millis, field, value, unit,
        coverage_basis_points, quality_flags, resolution, and timezone.
      tags: [Exports]
      security: [{ bearerAuth: [exports:write] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AnalysisExportRequest" }
            examples:
              csv:
                value: { startEpochMillis: 1774738800000, endEpochMillis: 1774821600000, fields: [generation_power, consumption_power], resolution: hour, timezone: Europe/Berlin, maximumPoints: 2000, format: csv, asynchronous: false }
              queuedJson:
                value: { startEpochMillis: 990000000000, endEpochMillis: 1780000000000, fields: [generation_energy], resolution: day, timezone: UTC, maximumPoints: 10000, format: json, asynchronous: true }
      responses:
        "200":
          description: Synchronous export artifact
          headers:
            Content-Disposition: { schema: { type: string }, example: attachment; filename="generation.csv" }
          content:
            text/csv:
              schema: { type: string }
              example: |-
                timestamp_epoch_millis,field,value,unit,coverage_basis_points,quality_flags,resolution,timezone
                1774738800000,generation_power,4200,watts,10000,0,hour,Europe/Berlin
            application/json:
              schema: { $ref: "#/components/schemas/SeriesQueryResult" }
        "202":
          description: Export job accepted
          headers: { Location: { schema: { type: string, format: uri-reference }, example: /api/v1/jobs/019505c8-7c85-7f0b-9bc3-2a3c4d5e6f72 } }
          content: { application/json: { schema: { $ref: "#/components/schemas/QueuedJob" }, example: { jobId: 019505c8-7c85-7f0b-9bc3-2a3c4d5e6f72 } } }
        "413": { $ref: "#/components/responses/RequiresAsyncProblem" }
        "422": { $ref: "#/components/responses/QueryProblem" }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    SystemId: { name: id, in: path, required: true, schema: { $ref: "#/components/schemas/UuidV7" } }
    AccountId: { name: account_id, in: path, required: true, schema: { $ref: "#/components/schemas/UuidV7" } }
    NestedSystemId: { name: system_id, in: path, required: true, schema: { $ref: "#/components/schemas/UuidV7" } }
    ObservationId: { name: observation_id, in: path, required: true, schema: { $ref: "#/components/schemas/UuidV7" } }
    IfMatch: { name: If-Match, in: header, required: true, schema: { type: string }, example: '"3"' }
    IfNoneMatch: { name: If-None-Match, in: header, required: false, schema: { type: string }, example: '"query-7f4a"' }
    StartEpochMillis: { name: startEpochMillis, in: query, required: true, schema: { type: integer, format: int64 }, description: Inclusive UTC range start in Unix epoch milliseconds. }
    EndEpochMillis: { name: endEpochMillis, in: query, required: true, schema: { type: integer, format: int64 }, description: Exclusive UTC range end in Unix epoch milliseconds. }
    SeriesFields: { name: fields, in: query, required: true, schema: { type: string, minLength: 1 }, example: "generation_power,consumption_power" }
    SeriesResolution: { name: resolution, in: query, required: false, schema: { enum: [auto, raw, 15m, hour, day, month, year], default: auto } }
    Timezone: { name: timezone, in: query, required: false, schema: { type: string, default: UTC }, description: IANA timezone used for calendar buckets and DST boundaries., example: Europe/Berlin }
    MaximumPoints: { name: maximumPoints, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 10000, default: 2000 }, description: Hard per-series point budget; responses may include at most two documented boundary points. }
  requestBodies:
    ManagedResource:
      required: true
      content:
        application/json:
          schema: { type: object, additionalProperties: true }
          example: { name: Example resource }
  responses:
    SystemResponse:
      description: Versioned system representation
      headers: { ETag: { schema: { type: string } } }
      content: { application/json: { schema: { $ref: "#/components/schemas/System" } } }
    ManagedResource:
      description: Versioned managed resource
      headers: { ETag: { schema: { type: string } } }
      content: { application/json: { schema: { $ref: "#/components/schemas/ManagedResource" } } }
    ResourceList:
      description: Managed resource collection
      content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/ManagedResource" } } } }
    ValidationProblem: { description: Request validation failed, content: { application/problem+json: { schema: { $ref: "#/components/schemas/Problem" } } } }
    PreconditionProblem: { description: ETag precondition failed, content: { application/problem+json: { schema: { $ref: "#/components/schemas/Problem" } } } }
    ForbiddenProblem: { description: Required scope is missing, content: { application/problem+json: { schema: { $ref: "#/components/schemas/Problem" } } } }
    ConflictProblem: { description: Optimistic concurrency conflict, content: { application/problem+json: { schema: { $ref: "#/components/schemas/Problem" } } } }
    OverloadProblem: { description: Ingestion is temporarily saturated, headers: { Retry-After: { schema: { type: integer, minimum: 1 } } }, content: { application/problem+json: { schema: { $ref: "#/components/schemas/Problem" } } } }
    QueryProblem: { description: "Query bounds, fields, resolution, timezone, or point budget are invalid.", content: { application/problem+json: { schema: { $ref: "#/components/schemas/Problem" }, example: { type: https://pvlog.example/problems/query, title: Invalid analytics query, status: 422, detail: The raw query exceeds maximumPoints., requestId: 019505c8-7c85-7f0b-9bc3-2a3c4d5e6f70 } } } }
    RequiresAsyncProblem: { description: The requested export is too large for synchronous processing; retry with asynchronous true., content: { application/problem+json: { schema: { $ref: "#/components/schemas/Problem" } } } }
    NotAcceptable:
      description: Requested response representation is not available
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    InternalServerError:
      description: Unexpected server failure
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
  schemas:
    CreateSystem:
      type: object
      required: [accountId, name, timezone]
      properties: { accountId: { $ref: "#/components/schemas/UuidV7" }, name: { type: string, minLength: 1 }, timezone: { type: string, example: Europe/Berlin } }
    UpdateSystem:
      type: object
      required: [name, timezone, visibility]
      properties: { name: { type: string, minLength: 1 }, timezone: { type: string }, visibility: { enum: [private, account, unlisted, public] } }
    System:
      allOf:
        - $ref: "#/components/schemas/UpdateSystem"
        - type: object
          required: [id, accountId, lifecycle, version]
          properties: { id: { $ref: "#/components/schemas/UuidV7" }, accountId: { $ref: "#/components/schemas/UuidV7" }, lifecycle: { enum: [active, archived, pending_deletion] }, version: { type: integer, minimum: 1 } }
    ManagedResource:
      type: object
      required: [id, accountId, kind, version, attributes]
      properties: { id: { $ref: "#/components/schemas/UuidV7" }, accountId: { $ref: "#/components/schemas/UuidV7" }, systemId: { $ref: "#/components/schemas/UuidV7" }, kind: { enum: [equipment, tariff, channel, membership, credential] }, version: { type: integer, minimum: 1 }, attributes: { type: object, additionalProperties: true } }
    ObservationInput:
      type: object
      required: [observedAtEpochMillis]
      properties: { observedAtEpochMillis: { type: integer }, generationPowerWatts: { type: integer }, generationEnergyWh: { type: integer }, consumptionPowerWatts: { type: integer }, consumptionEnergyWh: { type: integer }, voltageMillivolts: { type: integer, minimum: 0 }, temperatureMillidegreesCelsius: { type: integer }, sourceReference: { type: string } }
    ObservationBatchInput:
      type: object
      required: [mode, items]
      properties: { mode: { enum: [atomic, partial] }, items: { type: array, minItems: 1, maxItems: 1000, items: { allOf: [{ $ref: "#/components/schemas/ObservationInput" }, { type: object, required: [idempotencyKey], properties: { idempotencyKey: { type: string, minLength: 1 } } }] } } }
    SeriesQueryResult:
      type: object
      additionalProperties: false
      required: [actualResolution, timezone, series]
      properties:
        actualResolution: { enum: [raw, fifteen_minutes, hourly, daily, monthly, yearly] }
        timezone: { type: string, description: IANA timezone used for calendar bucket boundaries. }
        series: { type: array, items: { $ref: "#/components/schemas/Series" } }
    Series:
      type: object
      additionalProperties: false
      required: [field, unit, points, gaps]
      properties:
        field: { enum: [generation_power, generation_energy, consumption_power, consumption_energy, grid_power, battery_power, battery_state_of_charge, temperature, extended, provenance] }
        unit: { enum: [watts, watt_hours, basis_points, milli_degrees_celsius, integer] }
        points: { type: array, items: { $ref: "#/components/schemas/SeriesPoint" } }
        gaps: { type: array, items: { $ref: "#/components/schemas/SeriesGap" } }
    SeriesPoint:
      type: object
      additionalProperties: false
      required: [timestampEpochMillis, value, coverageBasisPoints, qualityFlags]
      properties:
        timestampEpochMillis: { type: integer, format: int64 }
        value: { type: integer, format: int64 }
        coverageBasisPoints: { type: integer, minimum: 0, maximum: 10000 }
        qualityFlags: { type: integer, minimum: 0 }
        provenance: { type: [string, "null"], description: Present only for corrected raw points. }
    SeriesGap:
      type: object
      additionalProperties: false
      required: [startEpochMillis, endEpochMillis, kind]
      properties:
        startEpochMillis: { type: integer, format: int64 }
        endEpochMillis: { type: integer, format: int64 }
        kind: { enum: [missing, suspect, incomplete_coverage] }
    EnergyStatistics:
      type: object
      required: [period, coverageBasisPoints]
      properties:
        period: { enum: [daily, monthly, yearly, lifetime] }
        generationWh: { type: [integer, "null"], minimum: 0 }
        consumptionWh: { type: [integer, "null"], minimum: 0 }
        gridImportWh: { type: [integer, "null"], minimum: 0 }
        gridExportWh: { type: [integer, "null"], minimum: 0 }
        selfConsumptionWh: { type: [integer, "null"], minimum: 0 }
        efficiencyWhPerKw: { type: [integer, "null"], minimum: 0 }
        peakGenerationWatts: { type: [integer, "null"] }
        minimumTemperatureMilliCelsius: { type: [integer, "null"] }
        maximumTemperatureMilliCelsius: { type: [integer, "null"] }
        batteryChargeWh: { type: [integer, "null"], minimum: 0 }
        batteryDischargeWh: { type: [integer, "null"], minimum: 0 }
        minimumBatteryBasisPoints: { type: [integer, "null"], minimum: 0, maximum: 10000 }
        maximumBatteryBasisPoints: { type: [integer, "null"], minimum: 0, maximum: 10000 }
        revenueMinorUnits: { type: [integer, "null"] }
        costMinorUnits: { type: [integer, "null"] }
        netFinancialMinorUnits: { type: [integer, "null"] }
        coverageBasisPoints: { type: integer, minimum: 0, maximum: 10000 }
    DataQualityIssue:
      type: object
      additionalProperties: false
      required: [kind, startEpochMillis, endEpochMillis, sourceReferences]
      properties:
        kind: { enum: [missing_interval, suspect_observation, source_conflict, counter_reset, rejected_ingestion, aggregate_lag] }
        startEpochMillis: { type: integer, format: int64 }
        endEpochMillis: { type: integer, format: int64 }
        sourceReferences: { type: array, items: { type: string } }
        reasonCode: { type: [string, "null"] }
    ComparisonMetric: { enum: [total_generation, normalized_generation] }
    ComparisonRequest:
      type: object
      additionalProperties: false
      required: [systemIds, metric]
      properties:
        systemIds: { type: array, minItems: 2, maxItems: 20, uniqueItems: true, items: { $ref: "#/components/schemas/UuidV7" } }
        metric: { $ref: "#/components/schemas/ComparisonMetric" }
    ComparisonEntry:
      type: object
      additionalProperties: false
      required: [rank, systemId, displayName, totalGenerationWh, normalizedGenerationWhPerKw, coverageBasisPoints, tied, projectionAgeMillis]
      properties:
        rank: { type: integer, minimum: 1 }
        systemId: { $ref: "#/components/schemas/UuidV7" }
        displayName: { type: string }
        totalGenerationWh: { type: integer, minimum: 0 }
        normalizedGenerationWhPerKw: { type: integer, minimum: 0 }
        coverageBasisPoints: { type: integer, minimum: 0, maximum: 10000 }
        tied: { type: boolean }
        projectionAgeMillis: { type: integer, minimum: 0 }
    AnalysisExportRequest:
      type: object
      additionalProperties: false
      required: [startEpochMillis, endEpochMillis, fields, format]
      properties:
        startEpochMillis: { type: integer, format: int64 }
        endEpochMillis: { type: integer, format: int64 }
        fields: { type: array, minItems: 1, uniqueItems: true, items: { type: string } }
        resolution: { enum: [auto, raw, 15m, hour, day, month, year], default: auto }
        timezone: { type: string, default: UTC }
        maximumPoints: { type: integer, minimum: 1, maximum: 10000, default: 2000 }
        format: { enum: [csv, json] }
        asynchronous: { type: boolean, default: false }
    QueuedJob:
      type: object
      additionalProperties: false
      required: [jobId]
      properties: { jobId: { $ref: "#/components/schemas/UuidV7" } }
    UuidV7:
      type: string
      format: uuid
      pattern: "^[0-9a-f]{8}-[0-9a-f]{4}-7[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$"
      description: >-
        Canonical lowercase UUID version 7 generated by PVLog. Treat this value
        as opaque; its time-sortable bits do not grant authority or establish an
        authoritative creation timestamp.
      examples:
        - 019505c8-7c85-7f0b-9bc3-2a3c4d5e6f70
    HealthStatus:
      type: object
      additionalProperties: false
      required:
        - status
        - service
        - version
      properties:
        status:
          type: string
          const: ok
          description: Liveness result.
        service:
          type: string
          description: Process service name.
          examples:
            - pvlog
        version:
          type: string
          description: Running application version.
          examples:
            - 0.1.0
    Problem:
      type: object
      additionalProperties: true
      description: RFC 9457 problem details.
      required:
        - type
        - title
        - status
        - requestId
      properties:
        type:
          type: string
          format: uri-reference
          description: Stable problem type identifier.
        title:
          type: string
          description: Short human-readable problem title.
        status:
          type: integer
          minimum: 400
          maximum: 599
          description: HTTP status code.
        detail:
          type: string
          description: Safe occurrence-specific explanation.
        requestId:
          $ref: "#/components/schemas/UuidV7"
