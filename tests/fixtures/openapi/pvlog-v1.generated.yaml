          type: array
          minItems: 1
          uniqueItems: true
          items: { $ref: "#/components/schemas/AccountApiKeyScope" }
        expiresAtEpochMillis:
          type: [integer, "null"]
          format: int64
          description: Optional future expiry as Unix epoch milliseconds.
    AccountApiKey:
      type: object
      additionalProperties: false
      required: [id, name, scopes, createdAtEpochMillis]
      properties:
        id: { $ref: "#/components/schemas/UuidV7" }
        name: { type: string }
        scopes:
          type: array
          uniqueItems: true
          items: { $ref: "#/components/schemas/AccountApiKeyScope" }
        createdAtEpochMillis: { type: integer, format: int64 }
        expiresAtEpochMillis: { type: [integer, "null"], format: int64 }
        revokedAtEpochMillis: { type: [integer, "null"], format: int64 }
    IssuedAccountApiKey:
      type: object
      additionalProperties: false
      required: [apiKey, credential]
      properties:
        apiKey:
          type: string
          minLength: 40
          writeOnly: true
          description: One-time cleartext bearer key. Copy it before dismissing the response.
        credential: { $ref: "#/components/schemas/AccountApiKey" }
    GeocodingResult:
      type: object
      additionalProperties: false
      required: [displayName, latitude, longitude, attribution]
      properties:
        displayName: { type: string }
        latitude: { type: number, minimum: -90, maximum: 90 }
        longitude: { type: number, minimum: -180, maximum: 180 }
        attribution: { type: string }
    FreeFormObject:
      type: object
      additionalProperties: true
    OperationalHealth:
      type: object
      additionalProperties: false
      required: [status, detail]
      properties:
        status: { type: string, enum: [ok] }
        detail: { type: string }
        value: { type: integer, format: int64, minimum: 0 }
    CatalogProvenance:
      type: object
      additionalProperties: false
      required: [sourceName, sourceReference]
      properties:
        sourceName: { type: string }
        sourceReference: { type: string, format: uri }
        retrievedOn: { type: [string, "null"], format: date }
    EquipmentValueProvenance:
      type: string
      enum: [manual, catalog_copied, catalog_customized]
    EquipmentTemplateReference:
      type: object
      additionalProperties: false
      required: [entryId, revision, valueProvenance]
      properties:
        entryId:
          { type: string, description: Stable opaque catalog identifier. }
        revision:
          {
            type: string,
            description: Revision explicitly copied into this editable snapshot.,
          }
        valueProvenance:
          { $ref: "#/components/schemas/EquipmentValueProvenance" }
    InverterDcSpecification:
      type: object
      description: DC voltages are millivolts and currents are milliamperes. Per-MPPT limits preserve asymmetric trackers.
      additionalProperties: true
      required: [totalStringInputCount, mpptInputs]
      properties:
        topology: { type: [string, "null"] }
        totalStringInputCount: { type: integer, minimum: 1 }
        maximumInputVoltageMillivolts: { type: [integer, "null"], minimum: 1 }
        startVoltageMillivolts: { type: [integer, "null"], minimum: 1 }
        nominalInputVoltageMillivolts: { type: [integer, "null"], minimum: 1 }
        minimumMpptVoltageMillivolts: { type: [integer, "null"], minimum: 1 }
        maximumMpptVoltageMillivolts: { type: [integer, "null"], minimum: 1 }
        maximumInputCurrentMilliamperes: { type: [integer, "null"], minimum: 1 }
        maximumShortCircuitCurrentMilliamperes:
          { type: [integer, "null"], minimum: 1 }
        mpptInputs:
          type: array
          minItems: 1
          items:
            type: object
            additionalProperties: false
            required: [trackerIndex, stringInputCount]
            properties:
              trackerIndex: { type: integer, minimum: 1 }
              stringInputCount: { type: integer, minimum: 1 }
              maximumOperatingCurrentMilliamperes:
                { type: [integer, "null"], minimum: 1 }
              maximumShortCircuitCurrentMilliamperes:
                { type: [integer, "null"], minimum: 1 }
              minimumVoltageMillivolts: { type: [integer, "null"], minimum: 1 }
              maximumVoltageMillivolts: { type: [integer, "null"], minimum: 1 }
    InverterAcSpecification:
      type: object
      description: AC power uses watts or volt-amperes, voltage millivolts, current milliamperes, frequency millihertz and ratios basis points.
      additionalProperties: true
      required: [phaseCount, ratedActivePowerWatts]
      properties:
        phaseCount: { type: integer, minimum: 1, maximum: 3 }
        ratedActivePowerWatts: { type: integer, minimum: 1 }
        maximumActivePowerWatts: { type: [integer, "null"], minimum: 1 }
        maximumApparentPowerVoltAmperes: { type: [integer, "null"], minimum: 1 }
        maximumOutputCurrentMilliamperes:
          { type: [integer, "null"], minimum: 1 }
        maximumEfficiencyBasisPoints:
          { type: [integer, "null"], minimum: 0, maximum: 10000 }
    InverterOperationalSpecification:
      type: object
      description: Temperatures use milli-degrees Celsius, dimensions millimetres, weight grams and acoustic noise millidecibels.
      additionalProperties: true
    InverterSpecificationSnapshot:
      type: object
      additionalProperties: false
      required: [manufacturer, model, dc, ac, operational]
      properties:
        manufacturer: { type: string, minLength: 1 }
        model: { type: string, minLength: 1 }
        dc: { $ref: "#/components/schemas/InverterDcSpecification" }
        ac: { $ref: "#/components/schemas/InverterAcSpecification" }
        operational:
          { $ref: "#/components/schemas/InverterOperationalSpecification" }
        template:
          {
            anyOf:
              [
                { $ref: "#/components/schemas/EquipmentTemplateReference" },
                { type: "null" },
              ],
          }
    InverterCatalogEntry:
      allOf:
        - { $ref: "#/components/schemas/InverterSpecificationSnapshot" }
