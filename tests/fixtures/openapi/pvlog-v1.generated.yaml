  /api/v1/systems/{system_id}/observations:
    parameters: [{ $ref: "#/components/parameters/NestedSystemId" }]
    post:
      operationId: createObservation
      summary: Ingest one observation
      description: Normalizes and durably stores one idempotent canonical observation. Account API keys require the telemetry:write scope and standard bearer authentication. Query credentials are rejected before ingestion.
      tags: [Telemetry]
      security: [{ bearerAuth: [telemetry:write] }]
      x-codeSamples:
        - lang: Shell
          label: Account API key
          source: |-
            curl --fail-with-body \
              -H 'content-type: application/json' \
              -H 'idempotency-key: reading-1780000000000' \
              -H 'authorization: Bearer pvlog_REDACTED' \
              --data '{"observedAtEpochMillis":1780000000000,"generationPowerWatts":4200}' \
              https://pvlog.example/api/v1/systems/SYSTEM_ID/observations
      parameters:
        [
          {
            name: Idempotency-Key,
            in: header,
            required: true,
            schema: { type: string, minLength: 1 },
          },
        ]
      requestBody:
        {
          required: true,
          content:
            {
              application/json:
                {
                  schema: { $ref: "#/components/schemas/ObservationInput" },
                  example:
                    {
                      observedAtEpochMillis: 1780000000000,
                      generationPowerWatts: 4200,
                      generationEnergyWh: 350,
                    },
                },
            },
        }
      responses:
        {
          "201":
            {
              description: Observation accepted,
              content: { application/json: { schema: { type: object } } },
            },
          "422": { $ref: "#/components/responses/ValidationProblem" },
          "401": { $ref: "#/components/responses/UnauthorizedProblem" },
          "429": { $ref: "#/components/responses/RateLimitProblem" },
          "503": { $ref: "#/components/responses/OverloadProblem" },
        }
  /api/v1/systems/{system_id}/observations/batch:
    parameters: [{ $ref: "#/components/parameters/NestedSystemId" }]
    post:
      operationId: createObservationBatch
      summary: Ingest an observation batch
      description: Processes a bounded batch in atomic or partial-result mode using a bearer account API key with telemetry:write.
      tags: [Telemetry]
      security: [{ bearerAuth: [telemetry:write] }]
      requestBody:
        {
          required: true,
          content:
            {
              application/json:
                {
                  schema:
                    { $ref: "#/components/schemas/ObservationBatchInput" },
                },
            },
        }
      responses:
        {
          "200":
            {
              description: Stable indexed batch outcomes,
              content: { application/json: { schema: { type: object } } },
            },
          "422": { $ref: "#/components/responses/ValidationProblem" },
          "401": { $ref: "#/components/responses/UnauthorizedProblem" },
          "429": { $ref: "#/components/responses/RateLimitProblem" },
