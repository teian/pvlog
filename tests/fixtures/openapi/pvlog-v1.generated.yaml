openapi: 3.1.1
jsonSchemaDialect: https://spec.openapis.org/oas/3.1/dialect/base
info:
  title: PVLog REST API
  version: 0.1.0
  summary: Modern self-hosted photovoltaic monitoring API
  description: >-
    The versioned JSON contract for PVLog.
  license:
    name: Apache License 2.0
    identifier: Apache-2.0
servers:
  - url: /
    description: Current PVLog installation
tags:
  - name: Operations
    description: Process and deployment health
  - name: Systems
    description: PV system lifecycle and account-owned configuration
  - name: Equipment Catalog
    description: Offline inverter and solar-module templates with normalized engineering units
  - name: Telemetry
    description: Canonical observation ingestion and correction
  - name: Analytics
    description: Resolution-aware time series, statistics, and data quality
  - name: Forecasting
    description: Versioned PV yield settings, weather runs, modeled series, and performance
  - name: Exports
    description: Synchronous and asynchronous analysis exports
  - name: Notifications
    description: Alert rules, events, webhook subscriptions, and delivery attempts
  - name: Authentication
    description: Browser sessions, local authentication, and account API-key lifecycle
  - name: Administration
    description: Authorized account, role, identity, and audit administration
paths:
  /api/v1/health/live:
    get:
      operationId: getLiveness
      summary: Check process liveness
      description: Confirms that the HTTP process can execute requests.
      tags:
        - Operations
      security: []
      responses:
        "200":
          description: Process is live
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
              examples:
                live:
                  summary: Live process
                  value:
                    status: ok
                    service: pvlog
                    version: 0.1.0
        "406":
          $ref: "#/components/responses/NotAcceptable"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/health/ready:
    get:
      operationId: getReadiness
      summary: Check dependency readiness
      description: Verifies that the configured management and account database topology is available for serving requests.
      tags: [Operations]
      security: []
      responses:
        "200":
          description: Required runtime dependencies are ready
          content:
            {
              application/json:
                { schema: { $ref: "#/components/schemas/ReadinessStatus" } },
            }
        "406": { $ref: "#/components/responses/NotAcceptable" }
        "503": { $ref: "#/components/responses/ServiceUnavailableProblem" }
  /api/v1/health/version:
    get:
      operationId: getBuildVersion
      summary: Read running build version
      description: Returns process build metadata without checking database or job readiness.
      tags: [Operations]
      security: []
      responses:
        "200":
          description: Running process version
          content:
            {
              application/json:
                { schema: { $ref: "#/components/schemas/HealthStatus" } },
            }
        "406": { $ref: "#/components/responses/NotAcceptable" }
  /api/v1/health/dependencies:
    get:
      operationId: getDependencyHealth
      summary: Check required runtime dependencies
      description: Probes the configured management and account database dependencies.
      tags: [Operations]
      security: []
      responses:
        "200":
          description: Dependencies are reachable
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OperationalHealth" }
        "406": { $ref: "#/components/responses/NotAcceptable" }
        "503": { $ref: "#/components/responses/ServiceUnavailableProblem" }
  /api/v1/health/job-lag:
    get:
      operationId: getJobLagHealth
      summary: Check account job queue lag
      description: Reports whether the durable job queue is within its lag objective.
      tags: [Operations]
      security: []
      responses:
        "200":
          description: Job queue is within its configured lag objective
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OperationalHealth" }
        "406": { $ref: "#/components/responses/NotAcceptable" }
        "503": { $ref: "#/components/responses/ServiceUnavailableProblem" }
  /api/v1/health/storage-integrity:
    get:
      operationId: getStorageIntegrityHealth
      summary: Check storage reachability and integrity state
      description: Reports the latest non-mutating database storage probe result.
      tags: [Operations]
      security: []
      responses:
        "200":
          description: Storage probe passed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OperationalHealth" }
        "406": { $ref: "#/components/responses/NotAcceptable" }
        "503": { $ref: "#/components/responses/ServiceUnavailableProblem" }
  /api/v1/admin/users:
    get:
      operationId: listLocalUsers
      summary: List local users
      description: Returns administrator-visible local user metadata without credentials.
      tags: [Administration]
      security: [{ sessionCookie: [] }]
      responses:
        "200":
          description: Local users
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AdministrationUser" }
        "403": { $ref: "#/components/responses/ForbiddenProblem" }
    post:
      operationId: createLocalUser
      summary: Create a local user
      description: Creates an administrator-managed local user without exposing credential material.
      tags: [Administration]
      security: [{ sessionCookie: [] }]
      requestBody:
        {
          required: true,
          content:
            {
              application/json:
                { schema: { $ref: "#/components/schemas/FreeFormObject" } },
            },
        }
      responses:
        "201":
          {
            description: User created,
            content:
              {
                application/json:
                  { schema: { $ref: "#/components/schemas/FreeFormObject" } },
              },
          }
        "400": { $ref: "#/components/responses/Problem" }
  /api/v1/admin/weather-feed:
    get:
      operationId: getWeatherFeedSettings
      tags: [Administration]
      summary: Read the provider-neutral weather feed settings
      description: Returns the configured weather source without resolving or exposing credential secrets.
      security: [{ sessionCookie: [] }]
      responses:
        "200":
          description: Weather feed settings
          content:
            {
              application/json:
                {
                  schema: { $ref: "#/components/schemas/WeatherFeedSettings" },
                },
            }
        "403": { $ref: "#/components/responses/ForbiddenProblem" }
    put:
      operationId: updateWeatherFeedSettings
      tags: [Administration]
      summary: Update the provider-neutral weather feed settings
      description: Persists weather source settings and a reference to separately managed credentials.
      security: [{ sessionCookie: [] }]
      requestBody:
        required: true
        content:
          {
            application/json:
              { schema: { $ref: "#/components/schemas/WeatherFeedSettings" } },
          }
      responses:
        "200":
          description: Updated weather feed settings
          content:
            {
              application/json:
                {
                  schema: { $ref: "#/components/schemas/WeatherFeedSettings" },
                },
            }
        "400": { $ref: "#/components/responses/Problem" }
  /api/v1/admin/weather-feed/test:
    post:
      operationId: testWeatherFeedConnection
      tags: [Administration]
      summary: Test weather feed network reachability
      description: Checks whether the configured weather source host and port are reachable.
      security: [{ sessionCookie: [] }]
      responses:
        "200":
          description: Reachability result
          content:
            {
              application/json:
                {
                  schema: { $ref: "#/components/schemas/ConnectionTestResult" },
                },
            }
        "400": { $ref: "#/components/responses/Problem" }
  /api/v1/admin/email-notifications:
    get:
      operationId: getEmailNotificationSettings
      tags: [Administration]
      summary: Read SMTP notification settings
      description: Returns SMTP delivery settings while exposing only a credential secret reference.
      security: [{ sessionCookie: [] }]
      responses:
        "200":
          description: SMTP notification settings
          content:
            {
              application/json:
                {
                  schema:
                    { $ref: "#/components/schemas/EmailNotificationSettings" },
                },
            }
        "403": { $ref: "#/components/responses/ForbiddenProblem" }
    put:
      operationId: updateEmailNotificationSettings
      tags: [Administration]
      summary: Update SMTP notification settings
      description: Persists SMTP delivery settings and a reference to separately managed credentials.
      security: [{ sessionCookie: [] }]
      requestBody:
        required: true
        content:
          {
            application/json:
              {
                schema:
                  { $ref: "#/components/schemas/EmailNotificationSettings" },
              },
          }
      responses:
        "200":
          description: Updated SMTP notification settings
          content:
            {
              application/json:
                {
                  schema:
                    { $ref: "#/components/schemas/EmailNotificationSettings" },
                },
            }
        "400": { $ref: "#/components/responses/Problem" }
  /api/v1/admin/email-notifications/test:
    post:
      operationId: testEmailNotificationConnection
      tags: [Administration]
      summary: Test SMTP network reachability
      description: Checks whether the configured SMTP host and port are reachable.
      security: [{ sessionCookie: [] }]
      responses:
        "200":
          description: Reachability result
          content:
            {
              application/json:
                {
                  schema: { $ref: "#/components/schemas/ConnectionTestResult" },
                },
            }
        "400": { $ref: "#/components/responses/Problem" }
  /api/v1/admin/retention-backup:
    get:
      operationId: getRetentionBackupSettings
      tags: [Administration]
      summary: Read retention and backup settings
      description: Returns the instance retention period, backup schedule, and last backup metadata.
      security: [{ sessionCookie: [] }]
      responses:
        "200":
          description: Retention and backup settings
          content:
            {
              application/json:
                {
                  schema:
                    { $ref: "#/components/schemas/RetentionBackupSettings" },
                },
            }
        "403": { $ref: "#/components/responses/ForbiddenProblem" }
    put:
      operationId: updateRetentionBackupSettings
      tags: [Administration]
      summary: Update retention and backup settings
      description: Persists the instance retention period and automatic backup schedule.
      security: [{ sessionCookie: [] }]
      requestBody:
        required: true
        content:
          {
            application/json:
              {
                schema:
                  { $ref: "#/components/schemas/RetentionBackupSettings" },
              },
          }
      responses:
        "200":
          description: Updated retention and backup settings
          content:
            {
              application/json:
                {
                  schema:
                    { $ref: "#/components/schemas/RetentionBackupSettings" },
                },
            }
        "400": { $ref: "#/components/responses/Problem" }
  /api/v1/admin/backups:
    post:
      operationId: runInstanceBackup
      tags: [Administration]
      summary: Run an immediate verified instance backup
      description: Creates a versioned operator bundle. PostgreSQL deployments require an external backup hook and return 501 otherwise.
      security: [{ sessionCookie: [] }]
      responses:
        "201":
          description: Backup completed
          content:
            {
              application/json:
                { schema: { $ref: "#/components/schemas/BackupResult" } },
            }
        "403": { $ref: "#/components/responses/ForbiddenProblem" }
        "501": { $ref: "#/components/responses/Problem" }
  /api/v1/admin/users/{id}:
    parameters: [{ $ref: "#/components/parameters/UserId" }]
    delete:
      operationId: deleteLocalUser
      summary: Delete a local user
      description: Deletes an eligible local user while preserving takeover and last-administrator protections.
      tags: [Administration]
      security: [{ sessionCookie: [] }]
      responses:
        "204": { description: User deleted }
        "400": { $ref: "#/components/responses/Problem" }
  /api/v1/admin/users/{id}/activate:
    parameters: [{ $ref: "#/components/parameters/UserId" }]
    post:
      operationId: activateLocalUser
      summary: Activate a local user
      description: Activates an invited or administrator-created local user.
      tags: [Administration]
      security: [{ sessionCookie: [] }]
      requestBody:
        {
          required: true,
          content:
            {
              application/json:
                { schema: { $ref: "#/components/schemas/FreeFormObject" } },
            },
        }
      responses:
        "200":
          {
            description: User activated,
            content:
              {
                application/json:
                  { schema: { $ref: "#/components/schemas/FreeFormObject" } },
              },
          }
        "400": { $ref: "#/components/responses/Problem" }
  /api/v1/admin/users/{id}/disable:
    parameters: [{ $ref: "#/components/parameters/UserId" }]
    post:
      operationId: disableLocalUser
      summary: Disable a local user
      description: Disables login and revokes active sessions for a local user.
      tags: [Administration]
      security: [{ sessionCookie: [] }]
      responses:
        "204": { description: User disabled }
        "400": { $ref: "#/components/responses/Problem" }
  /api/v1/admin/users/{id}/unlock:
    parameters: [{ $ref: "#/components/parameters/UserId" }]
    post:
      operationId: unlockLocalUser
      summary: Unlock a local user
      description: Clears an administrator-authorized brute-force lockout.
      tags: [Administration]
      security: [{ sessionCookie: [] }]
      responses:
        "204": { description: User unlocked }
        "400": { $ref: "#/components/responses/Problem" }
  /api/v1/admin/users/{id}/password:
    parameters: [{ $ref: "#/components/parameters/UserId" }]
    post:
      operationId: setInitialLocalPassword
      summary: Set an initial local password
      description: Sets the initial password under the configured password policy.
      tags: [Administration]
      security: [{ sessionCookie: [] }]
      requestBody:
        {
          required: true,
          content:
            {
              application/json:
                { schema: { $ref: "#/components/schemas/FreeFormObject" } },
            },
        }
      responses:
        "204": { description: Password set }
        "400": { $ref: "#/components/responses/Problem" }
  /api/v1/auth/register:
    post:
      operationId: registerLocalUser
      summary: Register a local user
      description: Registers a local user when instance self-registration policy permits it.
      tags: [Authentication]
      security: []
      requestBody:
        {
          required: true,
          content:
            {
              application/json:
                { schema: { $ref: "#/components/schemas/FreeFormObject" } },
            },
        }
      responses:
        "202": { description: Registration accepted }
        "400": { $ref: "#/components/responses/Problem" }
  /api/v1/auth/password:
    put:
      operationId: changeLocalPassword
      summary: Change the current local password
      description: Changes a password after current-password verification and revokes other sessions.
      tags: [Authentication]
      security: [{ sessionCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/CsrfToken" }]
      requestBody:
        {
          required: true,
          content:
            {
              application/json:
                { schema: { $ref: "#/components/schemas/ChangePassword" } },
            },
        }
      responses:
        "204": { description: Password changed; all other sessions are revoked }
        "401": { $ref: "#/components/responses/Problem" }
        "403": { $ref: "#/components/responses/ForbiddenProblem" }
        "422": { $ref: "#/components/responses/ValidationProblem" }
  /api/v1/auth/password-recovery:
    post:
      operationId: requestPasswordRecovery
      summary: Request password recovery
      description: Returns an enumeration-resistant acceptance response and emits a single-use token out of band.
      tags: [Authentication]
      security: []
      requestBody:
        {
          required: true,
          content:
            {
              application/json:
                { schema: { $ref: "#/components/schemas/FreeFormObject" } },
            },
        }
      responses:
        "202": { description: Recovery request accepted }
        "400": { $ref: "#/components/responses/Problem" }
  /api/v1/auth/password-recovery/complete:
    post:
      operationId: completePasswordRecovery
      summary: Complete password recovery
      description: Consumes a single-use recovery token and rotates the local password.
      tags: [Authentication]
      security: []
      requestBody:
        {
          required: true,
          content:
            {
              application/json:
                { schema: { $ref: "#/components/schemas/FreeFormObject" } },
            },
        }
      responses:
        "204": { description: Recovery completed }
        "400": { $ref: "#/components/responses/Problem" }
  /api/v1/account/profile:
    get:
      operationId: getCurrentUserProfile
      summary: Read the current user's profile
      description: Returns safe identity data for the cookie-authenticated user. No account or user identifier is accepted.
      tags: [Authentication]
      security: [{ sessionCookie: [] }]
      responses:
        "200":
          description: Current user's safe profile
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CurrentUserProfile" }
        "403": { $ref: "#/components/responses/ForbiddenProblem" }
        "404": { $ref: "#/components/responses/NotFoundProblem" }
        "503": { $ref: "#/components/responses/ServiceUnavailableProblem" }
    put:
      operationId: updateCurrentUserProfile
      summary: Update the current user's profile
      description: Changes only the current user's display name. Login-email changes require a separate verified workflow and are not accepted here.
      tags: [Authentication]
      security: [{ sessionCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/CsrfToken" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateCurrentUserProfile" }
      responses:
        "200":
          description: Updated current-user profile
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CurrentUserProfile" }
        "403": { $ref: "#/components/responses/ForbiddenProblem" }
        "404": { $ref: "#/components/responses/NotFoundProblem" }
        "422": { $ref: "#/components/responses/ValidationProblem" }
        "503": { $ref: "#/components/responses/ServiceUnavailableProblem" }
  /api/v1/account/api-keys:
    get:
      operationId: listAccountApiKeys
      summary: List current-account API keys
      description: Returns safe metadata for API keys owned by the authenticated user's implicit account. Cleartext keys and digests are never returned.
      tags: [Authentication]
      security: [{ sessionCookie: [] }]
      responses:
        "200":
          description: API-key metadata ordered by newest first
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AccountApiKey" }
        "403": { $ref: "#/components/responses/ForbiddenProblem" }
        "503": { $ref: "#/components/responses/ServiceUnavailableProblem" }
    post:
      operationId: createAccountApiKey
      summary: Create a current-account API key
      description: Creates one independently revocable bearer key. The apiKey property is returned by this operation exactly once and cannot be recovered later.
      tags: [Authentication]
      security: [{ sessionCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/CsrfToken" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateAccountApiKey" }
            examples:
              uploadOnly:
                summary: Upload PV telemetry without read or configuration access
                value:
                  name: Home automation uploader
                  scopes: [telemetry:write]
      responses:
        "201":
          description: API key created; copy apiKey now because it is never returned again
          headers:
            Cache-Control:
              schema: { type: string, const: no-store }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/IssuedAccountApiKey" }
        "403": { $ref: "#/components/responses/ForbiddenProblem" }
        "409": { $ref: "#/components/responses/ConflictProblem" }
        "422": { $ref: "#/components/responses/ValidationProblem" }
        "503": { $ref: "#/components/responses/ServiceUnavailableProblem" }
  /api/v1/account/api-keys/{api_key_id}:
    parameters:
      - $ref: "#/components/parameters/ApiKeyId"
    delete:
      operationId: revokeAccountApiKey
      summary: Revoke a current-account API key
      description: Permanently prevents the selected API key from authenticating without affecting other keys.
      tags: [Authentication]
      security: [{ sessionCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/CsrfToken" }]
      responses:
        "204": { description: API key revoked }
        "403": { $ref: "#/components/responses/ForbiddenProblem" }
        "404": { $ref: "#/components/responses/NotFoundProblem" }
        "503": { $ref: "#/components/responses/ServiceUnavailableProblem" }
  /api/v1/systems:
    post:
      operationId: createSystem
      tags: [Systems]
      summary: Create a private PV system
      description: Creates one system in the authenticated user's ownership context using private and active defaults. No separate account identifier is accepted.
      security: [{ bearerAuth: [systems:write] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateSystem" }
            example: { name: Roof PV, timezone: Europe/Berlin }
      responses:
        "201": { $ref: "#/components/responses/SystemResponse" }
        "422": { $ref: "#/components/responses/ValidationProblem" }
  /api/v1/systems/{id}:
    parameters:
      - $ref: "#/components/parameters/SystemId"
    get:
      operationId: getSystem
      tags: [Systems]
      summary: Read a manageable PV system
      description: Returns mutable system metadata and its current lifecycle version.
      security: [{ sessionCookie: [] }, { bearerAuth: [systems:write] }]
      responses:
        "200": { $ref: "#/components/responses/SystemResponse" }
        "403": { $ref: "#/components/responses/ForbiddenProblem" }
    put:
      operationId: updateSystem
      tags: [Systems]
      summary: Update a PV system
      description: Replaces mutable system settings when the supplied ETag is current.
      security: [{ bearerAuth: [systems:write] }]
      parameters: [{ $ref: "#/components/parameters/IfMatch" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateSystem" }
      responses:
        "200": { $ref: "#/components/responses/SystemResponse" }
        "412": { $ref: "#/components/responses/PreconditionProblem" }
    delete:
      operationId: deleteSystem
      tags: [Systems]
      summary: Permanently delete a PV system
      description: Starts confirmed permanent deletion when the supplied ETag is current.
      security: [{ bearerAuth: [systems:write] }]
      parameters:
        - $ref: "#/components/parameters/IfMatch"
        - {
            name: X-Confirm-Delete,
            in: header,
            required: true,
            schema: { type: boolean },
          }
      responses:
        "204": { description: System deletion accepted }
        "412": { $ref: "#/components/responses/PreconditionProblem" }
  /api/v1/systems/{id}/archive:
    post:
      operationId: archiveSystem
      tags: [Systems]
      summary: Archive a PV system
      description: Makes an active system inactive without deleting its stored data.
      security: [{ bearerAuth: [systems:write] }]
      parameters:
        - $ref: "#/components/parameters/SystemId"
        - $ref: "#/components/parameters/IfMatch"
      responses:
        {
          "200": { $ref: "#/components/responses/SystemResponse" },
          "412": { $ref: "#/components/responses/PreconditionProblem" },
        }
  /api/v1/systems/{id}/restore:
    post:
      operationId: restoreSystem
      tags: [Systems]
      summary: Restore a PV system
      description: Returns an archived system to active service.
      security: [{ bearerAuth: [systems:write] }]
      parameters:
        - $ref: "#/components/parameters/SystemId"
        - $ref: "#/components/parameters/IfMatch"
      responses:
        {
          "200": { $ref: "#/components/responses/SystemResponse" },
          "412": { $ref: "#/components/responses/PreconditionProblem" },
        }
  /api/v1/accounts/{account_id}/systems/{system_id}/equipment:
    parameters:
      [
        { $ref: "#/components/parameters/AccountId" },
        { $ref: "#/components/parameters/NestedSystemId" },
      ]
    get:
      {
        operationId: listEquipment,
        summary: List equipment,
        description: Lists effective-dated equipment for one system.,
        tags: [Systems],
        security: [{ bearerAuth: [systems:read] }],
        responses:
          {
            "200": { $ref: "#/components/responses/ResourceList" },
            "403": { $ref: "#/components/responses/ForbiddenProblem" },
          },
      }
    post:
      {
        operationId: createEquipment,
        summary: Create equipment,
        description: Adds validated effective-dated equipment to one system.,
        tags: [Systems],
        security: [{ bearerAuth: [systems:write] }],
        requestBody: { $ref: "#/components/requestBodies/ManagedResource" },
        responses:
          {
            "201": { $ref: "#/components/responses/ManagedResource" },
            "403": { $ref: "#/components/responses/ForbiddenProblem" },
          },
      }
  /api/v1/equipment-catalog/inverters:
    get:
      operationId: listCatalogInverters
      summary: Search bundled inverter templates
      description: Returns deterministic offline results. Catalog values are optional editable prefills, not compatibility or installation approval.
      tags: [Equipment Catalog]
      security: [{ sessionCookie: [] }, { bearerAuth: [systems:read] }]
      parameters:
        - { name: search, in: query, schema: { type: string } }
        - { name: manufacturer, in: query, schema: { type: string } }
        - {
            name: offset,
            in: query,
            schema: { type: integer, minimum: 0, default: 0 },
          }
        - {
            name: limit,
            in: query,
            schema: { type: integer, minimum: 1, maximum: 100, default: 25 },
          }
      responses:
        "200":
          description: A bounded catalog page with the bundled revision.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InverterCatalogPage" }
        "403": { $ref: "#/components/responses/ForbiddenProblem" }
