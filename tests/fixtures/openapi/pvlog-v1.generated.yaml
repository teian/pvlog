          required: [id, revision, provenance]
          properties:
            id: { type: string }
            revision: { type: string }
            provenance: { $ref: "#/components/schemas/CatalogProvenance" }
    SolarModuleSpecification:
      type: object
      description: Electrical values use watts, millivolts and milliamperes; efficiencies/bifaciality use basis points; signed temperature coefficients use ppm per degree Celsius; loads use pascals, dimensions millimetres and weight grams.
      additionalProperties: true
      required:
        [
          peakPowerWatts,
          openCircuitVoltageMillivolts,
          maximumPowerVoltageMillivolts,
          shortCircuitCurrentMilliamperes,
          maximumPowerCurrentMilliamperes,
          efficiencyBasisPoints,
        ]
      properties:
        peakPowerWatts: { type: integer, minimum: 1 }
        openCircuitVoltageMillivolts: { type: integer, minimum: 1 }
        maximumPowerVoltageMillivolts: { type: integer, minimum: 1 }
        shortCircuitCurrentMilliamperes: { type: integer, minimum: 1 }
        maximumPowerCurrentMilliamperes: { type: integer, minimum: 1 }
        efficiencyBasisPoints: { type: integer, minimum: 1, maximum: 10000 }
        shortCircuitCurrentTemperatureCoefficientPpmPerCelsius:
          { type: integer }
        openCircuitVoltageTemperatureCoefficientPpmPerCelsius: { type: integer }
        peakPowerTemperatureCoefficientPpmPerCelsius: { type: integer }
        bifacial: { type: boolean }
        bifacialityFactorBasisPoints:
          { type: [integer, "null"], minimum: 0, maximum: 10000 }
        bifacialityToleranceBasisPoints:
          { type: [integer, "null"], minimum: 0, maximum: 10000 }
    SolarModuleSpecificationSnapshot:
