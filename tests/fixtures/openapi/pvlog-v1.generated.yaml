    WebhookAttempt:
      type: object
      required: [attemptedAtEpochMillis]
      properties:
        attemptedAtEpochMillis: { type: integer, format: int64 }
        responseStatus: { type: [integer, "null"], minimum: 100, maximum: 599 }
        errorClass: { type: [string, "null"] }
        durationMilliseconds: { type: integer, minimum: 0 }
    CreateSystem:
      type: object
      additionalProperties: false
      required: [name, timezone]
      properties:
        {
          name: { type: string, minLength: 1 },
          timezone: { type: string, example: Europe/Berlin },
        }
    UpdateSystem:
      type: object
      required: [name, timezone, visibility]
      properties:
        {
          name: { type: string, minLength: 1 },
          timezone: { type: string },
          visibility: { enum: [private, account, unlisted, public] },
        }
    System:
      allOf:
        - $ref: "#/components/schemas/UpdateSystem"
        - type: object
          required: [id, accountId, lifecycle, version]
          properties:
            {
              id: { $ref: "#/components/schemas/UuidV7" },
              accountId: { $ref: "#/components/schemas/UuidV7" },
              lifecycle: { enum: [active, archived, pending_deletion] },
              version: { type: integer, minimum: 1 },
            }
    ManagedResource:
      type: object
      required: [id, accountId, kind, version, attributes]
      properties:
        {
          id: { $ref: "#/components/schemas/UuidV7" },
          accountId: { $ref: "#/components/schemas/UuidV7" },
          systemId: { $ref: "#/components/schemas/UuidV7" },
          kind: { enum: [equipment, tariff, channel, membership, credential] },
          version: { type: integer, minimum: 1 },
          attributes: { type: object, additionalProperties: true },
        }
    ObservationInput:
      type: object
      required: [observedAtEpochMillis]
      properties:
        {
          observedAtEpochMillis: { type: integer },
          generationPowerWatts: { type: integer },
          generationEnergyWh: { type: integer },
          consumptionPowerWatts: { type: integer },
          consumptionEnergyWh: { type: integer },
          voltageMillivolts: { type: integer, minimum: 0 },
          temperatureMillidegreesCelsius: { type: integer },
          sourceReference: { type: string },
        }
    ObservationBatchInput:
      type: object
      required: [mode, items]
      properties:
        {
          mode: { enum: [atomic, partial] },
          items:
            {
              type: array,
              minItems: 1,
              maxItems: 1000,
              items:
                {
                  allOf:
                    [
                      { $ref: "#/components/schemas/ObservationInput" },
                      {
                        type: object,
                        required: [idempotencyKey],
                        properties:
                          { idempotencyKey: { type: string, minLength: 1 } },
                      },
                    ],
                },
            },
        }
    ForecastScope:
      oneOf:
        - type: object
          additionalProperties: false
          required: [kind, account_id]
          properties:
            kind: { const: account }
            account_id: { $ref: "#/components/schemas/UuidV7" }
        - type: object
          additionalProperties: false
          required: [kind, account_id, system_id]
          properties:
            kind: { const: system }
            account_id: { $ref: "#/components/schemas/UuidV7" }
            system_id: { $ref: "#/components/schemas/UuidV7" }
        - type: object
          additionalProperties: false
          required: [kind, account_id, system_id, inverter_id]
          properties:
            kind: { const: inverter }
            account_id: { $ref: "#/components/schemas/UuidV7" }
            system_id: { $ref: "#/components/schemas/UuidV7" }
            inverter_id: { $ref: "#/components/schemas/UuidV7" }
        - type: object
          additionalProperties: false
          required: [kind, account_id, system_id, inverter_id, string_id]
          properties:
            kind: { const: string }
            account_id: { $ref: "#/components/schemas/UuidV7" }
            system_id: { $ref: "#/components/schemas/UuidV7" }
            inverter_id: { $ref: "#/components/schemas/UuidV7" }
            string_id: { $ref: "#/components/schemas/UuidV7" }
    ForecastLosses:
      type: object
      additionalProperties: false
      required:
        [
          soilingBasisPoints,
          shadingBasisPoints,
          mismatchBasisPoints,
          wiringBasisPoints,
          unavailabilityBasisPoints,
        ]
      properties:
        soilingBasisPoints: { type: integer, minimum: 0, maximum: 10000 }
        shadingBasisPoints: { type: integer, minimum: 0, maximum: 10000 }
        mismatchBasisPoints: { type: integer, minimum: 0, maximum: 10000 }
        wiringBasisPoints: { type: integer, minimum: 0, maximum: 10000 }
        unavailabilityBasisPoints: { type: integer, minimum: 0, maximum: 10000 }
    ForecastSettingsInput:
      type: object
      additionalProperties: false
      required:
        [
          effectiveFrom,
          effectiveTo,
          modelIdentifier,
          modelRevision,
          losses,
          calibrationBasisPoints,
        ]
      properties:
        effectiveFrom: { type: integer, format: int64 }
        effectiveTo: { type: [integer, "null"], format: int64 }
        modelIdentifier: { type: string, minLength: 1, maxLength: 64 }
        modelRevision: { type: integer, minimum: 1, maximum: 65535 }
        losses: { $ref: "#/components/schemas/ForecastLosses" }
        calibrationBasisPoints: { type: integer, minimum: -5000, maximum: 5000 }
    ForecastSettings:
      allOf:
        - { $ref: "#/components/schemas/ForecastSettingsInput" }
        - type: object
          additionalProperties: false
          required: [scope, version]
          properties:
            scope: { $ref: "#/components/schemas/ForecastScope" }
            version: { type: integer, format: int64, minimum: 1 }
    ForecastCompletenessReason:
      enum:
        - missing_system_location
        - missing_module_identity
        - missing_orientation
        - missing_tilt
        - missing_module_capacity
        - missing_module_specification
        - missing_forecast_settings
        - missing_weather_input
        - unsupported_weather_input
        - incompatible_input_run
        - partial_effective_capacity
        - insufficient_weather_coverage
        - insufficient_actual_coverage
        - missing_actual_telemetry
        - non_positive_expected_energy
        - no_effective_equipment
    ForecastCompleteness:
      oneOf:
        - const: complete
        - type: object
          additionalProperties: false
          required: [partial]
          properties:
            partial:
              type: object
              additionalProperties: false
              required: [reasons]
              properties:
                reasons:
                  {
                    type: array,
                    items:
                      {
                        $ref: "#/components/schemas/ForecastCompletenessReason",
                      },
                  }
        - type: object
          additionalProperties: false
          required: [unavailable]
          properties:
            unavailable:
              type: object
              additionalProperties: false
              required: [reasons]
              properties:
                reasons:
                  {
                    type: array,
                    items:
                      {
                        $ref: "#/components/schemas/ForecastCompletenessReason",
                      },
                  }
    ForecastInputCompleteness:
      type: object
      additionalProperties: false
      required:
        [
          scope,
          effectiveAt,
          includedCapacityWatts,
          totalEffectiveCapacityWatts,
          complete,
          reasons,
          version,
        ]
      properties:
        scope: { $ref: "#/components/schemas/ForecastScope" }
        effectiveAt: { type: integer, format: int64 }
        includedCapacityWatts: { type: integer, format: int64, minimum: 0 }
        totalEffectiveCapacityWatts:
          { type: integer, format: int64, minimum: 0 }
        complete: { type: boolean }
        reasons:
          {
            type: array,
            items: { $ref: "#/components/schemas/ForecastCompletenessReason" },
          }
        version: { type: integer, format: int64, minimum: 1 }
    ForecastProvenance:
      type: object
      additionalProperties: false
      required:
        [
          providerId,
          adapter,
          sourceUrl,
          licenseIdentifier,
          attribution,
          fetchedAt,
        ]
      properties:
        providerId: { type: string, minLength: 1 }
        adapter: { type: string, minLength: 1 }
        sourceUrl: { type: string, format: uri }
        licenseIdentifier: { type: string, minLength: 1 }
        attribution: { type: string, minLength: 1 }
        fetchedAt: { type: integer, format: int64 }
    ForecastRun:
      type: object
      additionalProperties: false
      required:
        [
          id,
          systemId,
          kind,
          issuedAt,
          validFrom,
          validTo,
          resolutionSeconds,
          freshness,
          provenance,
        ]
      properties:
        id: { $ref: "#/components/schemas/UuidV7" }
        systemId: { $ref: "#/components/schemas/UuidV7" }
        kind: { enum: [forecast, observed, reanalysis] }
        issuedAt: { type: [integer, "null"], format: int64 }
        validFrom: { type: integer, format: int64 }
        validTo: { type: integer, format: int64 }
        resolutionSeconds: { type: integer, minimum: 1 }
        freshness: { enum: [fresh, stale, unavailable] }
        provenance: { $ref: "#/components/schemas/ForecastProvenance" }
    YieldSeriesPoint:
      type: object
      additionalProperties: false
      required:
        [
          intervalStart,
          intervalEnd,
          centralPowerWatts,
          lowerPowerWatts,
          upperPowerWatts,
          centralEnergyWattHours,
          lowerEnergyWattHours,
          upperEnergyWattHours,
          coverageBasisPoints,
          completeness,
        ]
      properties:
        intervalStart: { type: integer, format: int64 }
        intervalEnd: { type: integer, format: int64 }
        centralPowerWatts: { type: [integer, "null"], format: int64 }
        lowerPowerWatts: { type: [integer, "null"], format: int64 }
        upperPowerWatts: { type: [integer, "null"], format: int64 }
        centralEnergyWattHours: { type: [integer, "null"], format: int64 }
        lowerEnergyWattHours: { type: [integer, "null"], format: int64 }
        upperEnergyWattHours: { type: [integer, "null"], format: int64 }
        coverageBasisPoints: { type: integer, minimum: 0, maximum: 10000 }
        completeness: { $ref: "#/components/schemas/ForecastCompleteness" }
    YieldSeries:
      type: object
      additionalProperties: false
      required:
        [
          scope,
          basis,
          resolution,
          issueTime,
          weatherRunId,
          calculationRunId,
          modelIdentifier,
          modelRevision,
          configurationDigest,
          freshness,
          provenance,
          includedCapacityWatts,
          totalEffectiveCapacityWatts,
          completeness,
          unavailableReasons,
          points,
        ]
      properties:
        scope: { $ref: "#/components/schemas/ForecastScope" }
        basis: { enum: [forecast, expected] }
        resolution: { enum: [fifteen_minutes, hour, day] }
        issueTime: { type: [integer, "null"], format: int64 }
        weatherRunId: { $ref: "#/components/schemas/UuidV7" }
        calculationRunId: { $ref: "#/components/schemas/UuidV7" }
        modelIdentifier: { type: string }
        modelRevision: { type: integer, minimum: 1 }
        configurationDigest: { type: string, pattern: "^[0-9a-f]{64}$" }
        freshness: { enum: [fresh, stale, unavailable] }
        provenance: { $ref: "#/components/schemas/ForecastProvenance" }
        includedCapacityWatts: { type: integer, format: int64, minimum: 0 }
        totalEffectiveCapacityWatts:
          { type: integer, format: int64, minimum: 0 }
        completeness: { $ref: "#/components/schemas/ForecastCompleteness" }
        unavailableReasons:
          {
            type: array,
            items: { $ref: "#/components/schemas/ForecastCompletenessReason" },
          }
        points:
          {
            type: array,
            maxItems: 10000,
            items: { $ref: "#/components/schemas/YieldSeriesPoint" },
          }
    PerformancePoint:
      type: object
      additionalProperties: false
      required:
        [
          intervalStart,
          intervalEnd,
          actualEnergyWattHours,
          modeledEnergyWattHours,
          ratioBasisPoints,
          actualCoverageBasisPoints,
          modeledCoverageBasisPoints,
          unavailableReason,
        ]
      properties:
        intervalStart: { type: integer, format: int64 }
        intervalEnd: { type: integer, format: int64 }
        actualEnergyWattHours: { type: [integer, "null"], format: int64 }
        modeledEnergyWattHours: { type: [integer, "null"], format: int64 }
        ratioBasisPoints: { type: [integer, "null"], minimum: 0 }
        actualCoverageBasisPoints: { type: integer, minimum: 0, maximum: 10000 }
        modeledCoverageBasisPoints:
          { type: integer, minimum: 0, maximum: 10000 }
        unavailableReason:
          oneOf:
            - { $ref: "#/components/schemas/ForecastCompletenessReason" }
            - { type: "null" }
    PerformanceSeries:
      type: object
      additionalProperties: false
      required:
        [
          scope,
          metric,
          basis,
          resolution,
          issueTime,
          weatherRunId,
          calculationRunId,
          modelIdentifier,
          modelRevision,
          configurationDigest,
          freshness,
          provenance,
          points,
        ]
      properties:
        scope: { $ref: "#/components/schemas/ForecastScope" }
        metric: { enum: [generation_performance, forecast_realization] }
        basis: { enum: [expected, forecast] }
        resolution: { enum: [fifteen_minutes, hour, day] }
        issueTime: { type: [integer, "null"], format: int64 }
        weatherRunId: { $ref: "#/components/schemas/UuidV7" }
        calculationRunId: { $ref: "#/components/schemas/UuidV7" }
        modelIdentifier: { type: string }
        modelRevision: { type: integer, minimum: 1 }
        configurationDigest: { type: string, pattern: "^[0-9a-f]{64}$" }
        freshness: { enum: [fresh, stale, unavailable] }
        provenance: { $ref: "#/components/schemas/ForecastProvenance" }
        points:
          {
            type: array,
            maxItems: 10000,
            items: { $ref: "#/components/schemas/PerformancePoint" },
          }
    ForecastProblem:
      allOf:
        - { $ref: "#/components/schemas/Problem" }
        - type: object
          required: [field]
          properties:
            field: { type: string }
    SeriesQueryResult:
      type: object
      additionalProperties: false
      required: [actualResolution, timezone, series]
      properties:
        actualResolution:
          { enum: [raw, fifteen_minutes, hourly, daily, monthly, yearly] }
        timezone:
          {
            type: string,
            description: IANA timezone used for calendar bucket boundaries.,
          }
        series: { type: array, items: { $ref: "#/components/schemas/Series" } }
    Series:
      type: object
      additionalProperties: false
      required: [field, unit, points, gaps]
      properties:
        field:
          {
            enum:
              [
                generation_power,
                generation_energy,
                forecast_power,
                forecast_energy,
                expected_energy,
                generation_performance,
                forecast_realization,
                consumption_power,
                consumption_energy,
                grid_power,
                battery_power,
                battery_state_of_charge,
                temperature,
                extended,
                provenance,
              ],
          }
        unit:
          {
            enum:
              [watts, watt_hours, basis_points, milli_degrees_celsius, integer],
          }
        points:
          { type: array, items: { $ref: "#/components/schemas/SeriesPoint" } }
        gaps: { type: array, items: { $ref: "#/components/schemas/SeriesGap" } }
    SeriesPoint:
      type: object
      additionalProperties: false
      required: [timestampEpochMillis, value, coverageBasisPoints, qualityFlags]
      properties:
        timestampEpochMillis: { type: integer, format: int64 }
        value: { type: integer, format: int64 }
        coverageBasisPoints: { type: integer, minimum: 0, maximum: 10000 }
        qualityFlags: { type: integer, minimum: 0 }
        provenance:
          {
            type: [string, "null"],
            description: Present only for corrected raw points.,
          }
    SeriesGap:
      type: object
      additionalProperties: false
      required: [startEpochMillis, endEpochMillis, kind]
      properties:
        startEpochMillis: { type: integer, format: int64 }
        endEpochMillis: { type: integer, format: int64 }
        kind: { enum: [missing, suspect, incomplete_coverage] }
    EnergyStatistics:
      type: object
      required: [period, coverageBasisPoints]
      properties:
        period: { enum: [daily, monthly, yearly, lifetime] }
        generationWh: { type: [integer, "null"], minimum: 0 }
        consumptionWh: { type: [integer, "null"], minimum: 0 }
        gridImportWh: { type: [integer, "null"], minimum: 0 }
        gridExportWh: { type: [integer, "null"], minimum: 0 }
        selfConsumptionWh: { type: [integer, "null"], minimum: 0 }
        efficiencyWhPerKw: { type: [integer, "null"], minimum: 0 }
        peakGenerationWatts: { type: [integer, "null"] }
        minimumTemperatureMilliCelsius: { type: [integer, "null"] }
        maximumTemperatureMilliCelsius: { type: [integer, "null"] }
        batteryChargeWh: { type: [integer, "null"], minimum: 0 }
        batteryDischargeWh: { type: [integer, "null"], minimum: 0 }
        minimumBatteryBasisPoints:
          { type: [integer, "null"], minimum: 0, maximum: 10000 }
        maximumBatteryBasisPoints:
          { type: [integer, "null"], minimum: 0, maximum: 10000 }
        revenueMinorUnits: { type: [integer, "null"] }
        costMinorUnits: { type: [integer, "null"] }
        netFinancialMinorUnits: { type: [integer, "null"] }
        coverageBasisPoints: { type: integer, minimum: 0, maximum: 10000 }
    DataQualityIssue:
      type: object
      additionalProperties: false
      required: [kind, startEpochMillis, endEpochMillis, sourceReferences]
      properties:
        kind:
          {
            enum:
              [
                missing_interval,
                suspect_observation,
                source_conflict,
                counter_reset,
                rejected_ingestion,
                aggregate_lag,
              ],
          }
        startEpochMillis: { type: integer, format: int64 }
        endEpochMillis: { type: integer, format: int64 }
        sourceReferences: { type: array, items: { type: string } }
        reasonCode: { type: [string, "null"] }
    AnalysisExportRequest:
      type: object
      additionalProperties: false
      required: [startEpochMillis, endEpochMillis, fields, format]
      properties:
        startEpochMillis: { type: integer, format: int64 }
        endEpochMillis: { type: integer, format: int64 }
        fields:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            enum:
              - generation_power
              - generation_energy
              - forecast_power
              - forecast_energy
              - expected_energy
              - generation_performance
              - forecast_realization
              - consumption_power
              - consumption_energy
              - grid_power
              - battery_power
              - battery_state_of_charge
              - temperature
              - extended
              - provenance
        resolution:
          { enum: [auto, raw, 15m, hour, day, month, year], default: auto }
        timezone: { type: string, default: UTC }
        maximumPoints:
          { type: integer, minimum: 1, maximum: 10000, default: 2000 }
        format: { enum: [csv, json] }
        asynchronous: { type: boolean, default: false }
        weatherRunId: { $ref: "#/components/schemas/UuidV7" }
        includePartial: { type: boolean, default: false }
    QueuedJob:
      type: object
      additionalProperties: false
      required: [jobId]
      properties: { jobId: { $ref: "#/components/schemas/UuidV7" } }
    SystemOverview:
      type: object
      additionalProperties: false
      required:
        [
          id,
          name,
          timezone,
          lifecycle,
          inverterCount,
          stringCount,
          capacityWatts,
        ]
      properties:
        id: { $ref: "#/components/schemas/UuidV7" }
        name: { type: string }
        timezone: { type: string }
        lifecycle: { enum: [active, archived, deleting, deleted] }
        inverterCount: { type: integer, minimum: 0 }
        stringCount: { type: integer, minimum: 0 }
        capacityWatts: { type: [integer, "null"], format: int64, minimum: 0 }
    ReportingStatistics:
      type: object
      additionalProperties: false
      required:
        [
          systemId,
          generationEnergyWh,
          consumptionEnergyWh,
          peakGenerationPowerWatts,
          firstObservationAtEpochMillis,
          lastObservationAtEpochMillis,
          coverageBasisPoints,
          monthly,
        ]
      properties:
        systemId: { $ref: "#/components/schemas/UuidV7" }
        generationEnergyWh: { type: [integer, "null"], format: int64 }
        consumptionEnergyWh: { type: [integer, "null"], format: int64 }
        peakGenerationPowerWatts: { type: [integer, "null"], format: int64 }
        firstObservationAtEpochMillis:
          { type: [integer, "null"], format: int64 }
        lastObservationAtEpochMillis: { type: [integer, "null"], format: int64 }
        coverageBasisPoints: { type: integer, minimum: 0, maximum: 10000 }
        monthly:
          type: array
          items: { $ref: "#/components/schemas/MonthlyProduction" }
    MonthlyProduction:
      type: object
      additionalProperties: false
      required:
        [
          bucketStartEpochMillis,
          generationEnergyWh,
          consumptionEnergyWh,
          coverageBasisPoints,
        ]
      properties:
        bucketStartEpochMillis: { type: integer, format: int64 }
        generationEnergyWh: { type: [integer, "null"], format: int64 }
        consumptionEnergyWh: { type: [integer, "null"], format: int64 }
        coverageBasisPoints: { type: integer, minimum: 0, maximum: 10000 }
    SeasonalProduction:
      type: object
      additionalProperties: false
      required: [systemId, seasons]
      properties:
        systemId: { $ref: "#/components/schemas/UuidV7" }
        seasons:
          type: array
          items: { $ref: "#/components/schemas/SeasonProduction" }
    SeasonProduction:
      type: object
      additionalProperties: false
      required: [season, generationEnergyWh, measuredDays, averageDailyEnergyWh]
      properties:
        season: { enum: [winter, spring, summer, autumn] }
        generationEnergyWh: { type: integer, format: int64 }
        measuredDays: { type: integer, minimum: 0 }
        averageDailyEnergyWh: { type: integer, format: int64 }
    WeatherForecastReport:
      type: object
      additionalProperties: false
      required: [systemId, issuedAtEpochMillis, attribution, points]
      properties:
        systemId: { $ref: "#/components/schemas/UuidV7" }
        issuedAtEpochMillis: { type: [integer, "null"], format: int64 }
        attribution: { type: [string, "null"] }
        points:
          type: array
          items: { $ref: "#/components/schemas/WeatherForecastPoint" }
    WeatherForecastPoint:
      type: object
      additionalProperties: false
      required:
        [
          intervalStartEpochMillis,
          intervalEndEpochMillis,
          irradianceWattsPerSquareMetre,
          ambientTemperatureMillicelsius,
          windSpeedMillimetresPerSecond,
          cloudCoverBasisPoints,
          predictedEnergyWh,
        ]
      properties:
        intervalStartEpochMillis: { type: integer, format: int64 }
        intervalEndEpochMillis: { type: integer, format: int64 }
        irradianceWattsPerSquareMetre:
          { type: [integer, "null"], format: int64, minimum: 0 }
        ambientTemperatureMillicelsius:
          { type: [integer, "null"], format: int64 }
        windSpeedMillimetresPerSecond:
          { type: [integer, "null"], format: int64, minimum: 0 }
        cloudCoverBasisPoints:
          { type: [integer, "null"], minimum: 0, maximum: 10000 }
        predictedEnergyWh: { type: [integer, "null"], format: int64 }
    Dashboard:
      type: object
      additionalProperties: false
      required:
        [
          observedAtEpochMillis,
          ageSeconds,
          freshnessThresholdSeconds,
          generationWatts,
          consumptionWatts,
          gridWatts,
          batteryBasisPoints,
          coverageBasisPoints,
          recentAlerts,
          ingestion,
        ]
      properties:
        observedAtEpochMillis: { type: integer, format: int64 }
        ageSeconds: { type: integer, minimum: 0 }
        freshnessThresholdSeconds: { type: integer, minimum: 1 }
        generationWatts: { type: number }
        consumptionWatts: { type: [number, "null"] }
        gridWatts: { type: [number, "null"] }
        batteryBasisPoints: { type: [integer, "null"] }
        coverageBasisPoints: { type: integer, minimum: 0, maximum: 10000 }
        recentAlerts:
          type: array
          items: { $ref: "#/components/schemas/DashboardAlert" }
        ingestion: { $ref: "#/components/schemas/DashboardIngestion" }
    DashboardAlert:
      type: object
      additionalProperties: false
      required: [id, title, state, openedAtEpochMillis]
      properties:
        id: { type: string }
        title: { type: string }
        state: { enum: [open, resolved] }
        openedAtEpochMillis: { type: integer, format: int64 }
    DashboardIngestion:
      type: object
      additionalProperties: false
      required: [acceptedToday, rejectedToday, lagSeconds]
      properties:
        acceptedToday: { type: integer, minimum: 0 }
        rejectedToday: { type: integer, minimum: 0 }
        lagSeconds: { type: integer, minimum: 0 }
    UuidV7:
      type: string
      format: uuid
      pattern: "^[0-9a-f]{8}-[0-9a-f]{4}-7[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$"
      description: >-
        Canonical lowercase UUID version 7 generated by PVLog. Treat this value
        as opaque; its time-sortable bits do not grant authority or establish an
        authoritative creation timestamp.
      examples:
        - 019505c8-7c85-7f0b-9bc3-2a3c4d5e6f70
    HealthStatus:
      type: object
      additionalProperties: false
      required:
        - status
        - service
        - version
      properties:
        status:
          type: string
          const: ok
          description: Liveness result.
        service:
          type: string
          description: Process service name.
          examples:
            - pvlog
        version:
          type: string
          description: Running application version.
          examples:
            - 0.1.0
    ReadinessStatus:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status: { const: ok }
    Problem:
      type: object
      additionalProperties: true
      description: RFC 9457 problem details.
      required:
        - type
        - title
        - status
        - requestId
      properties:
        type:
          type: string
          format: uri-reference
          description: Stable problem type identifier.
        title:
          type: string
          description: Short human-readable problem title.
        status:
          type: integer
          minimum: 400
          maximum: 599
          description: HTTP status code.
        detail:
          type: string
          description: Safe occurrence-specific explanation.
        requestId:
          $ref: "#/components/schemas/UuidV7"
