    parameters:
      [
        { $ref: "#/components/parameters/AccountId" },
        {
          name: webhook_id,
          in: path,
          required: true,
          schema: { $ref: "#/components/schemas/UuidV7" },
        },
      ]
    post:
      {
        operationId: verifyWebhook,
        tags: [Notifications],
        summary: Verify webhook endpoint ownership,
        description: Activates a pending subscription when its challenge matches and has not expired.,
        security: [{ bearerAuth: [webhooks:write] }],
        requestBody:
          {
            required: true,
            content:
              {
                application/json:
                  {
                    schema:
                      {
                        type: object,
                        required: [challenge],
                        properties: { challenge: { type: string } },
                      },
                  },
              },
          },
        responses:
          {
            "200":
              {
                description: Active webhook subscription,
                content:
                  {
                    application/json:
                      {
                        schema:
                          { $ref: "#/components/schemas/WebhookSubscription" },
                      },
                  },
              },
            "422": { $ref: "#/components/responses/ValidationProblem" },
          },
      }
