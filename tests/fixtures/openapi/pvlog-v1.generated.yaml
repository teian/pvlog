      properties:
        currentPassword:
          { type: string, format: password, minLength: 1, writeOnly: true }
        newPassword:
          {
            type: string,
            format: password,
            minLength: 12,
            maxLength: 128,
            writeOnly: true,
          }
    AccountApiKeyScope:
      type: string
      description: Explicit action permission. Scopes are independent and never imply another scope.
      enum: [systems:read, systems:write, telemetry:read, telemetry:write]
    CreateAccountApiKey:
      type: object
      additionalProperties: false
      required: [name, scopes]
