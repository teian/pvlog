    parameters:
      [
        { $ref: "#/components/parameters/AccountId" },
        {
          name: webhook_id,
          in: path,
          required: true,
          schema: { $ref: "#/components/schemas/UuidV7" },
        },
      ]
    delete:
      {
        operationId: deleteWebhook,
        tags: [Notifications],
        summary: Disable a webhook subscription,
        description: Disables delivery to one webhook subscription.,
        security: [{ bearerAuth: [webhooks:write] }],
        responses:
          {
            "204": { description: Subscription disabled },
            "404": { $ref: "#/components/responses/NotFoundProblem" },
          },
      }
  /api/v1/accounts/{account_id}/webhooks/{webhook_id}/attempts:
    parameters:
      [
        { $ref: "#/components/parameters/AccountId" },
        {
          name: webhook_id,
          in: path,
          required: true,
          schema: { $ref: "#/components/schemas/UuidV7" },
        },
      ]
    get:
      {
        operationId: listWebhookAttempts,
        tags: [Notifications],
        summary: List delivery attempts,
        description: Returns bounded outcome history for one subscription.,
        security: [{ bearerAuth: [webhooks:read] }],
        responses:
          {
            "200":
              {
                description: Delivery attempts,
                content:
                  {
                    application/json:
                      {
                        schema:
                          {
                            type: array,
                            items:
                              { $ref: "#/components/schemas/WebhookAttempt" },
                          },
                      },
                  },
              },
            "403": { $ref: "#/components/responses/ForbiddenProblem" },
          },
      }
  /api/v1/accounts/{account_id}/webhook-deliveries/{delivery_id}/replay:
    parameters:
      [
        { $ref: "#/components/parameters/AccountId" },
        {
          name: delivery_id,
          in: path,
          required: true,
          schema: { $ref: "#/components/schemas/UuidV7" },
        },
      ]
    post:
      {
        operationId: replayWebhookDelivery,
        tags: [Notifications],
        summary: Replay a dead-letter delivery,
        description: Requeues a dead-letter delivery for an administrative retry.,
        security: [{ bearerAuth: [webhooks:write] }],
        responses:
          {
            "200":
              {
                description: Delivery queued for replay,
                content: { application/json: { schema: { type: object } } },
              },
            "409": { $ref: "#/components/responses/ConflictProblem" },
          },
      }
  /api/v1/dashboard:
    get:
      operationId: getOperationalDashboard
      tags: [Operations]
      summary: Read the operational dashboard projection
      description: Returns freshness-safe live status, coverage, recent alerts, and ingestion health for the authenticated installation view.
      security: [{ sessionCookie: [] }]
      responses:
        "200":
          description: Current operational dashboard projection
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Dashboard" }
        "401": { $ref: "#/components/responses/UnauthorizedProblem" }
        "503": { $ref: "#/components/responses/ServiceUnavailableProblem" }
  /api/v1/session:
    get:
      operationId: getBrowserSession
      tags: [Authentication]
      summary: Bootstrap the current browser session
      description: Returns anonymous state when no cookie is present and authenticated state for a valid browser session.
      security: [{ sessionCookie: [] }]
      responses:
        "200":
          description: Authenticated or anonymous session bootstrap
          content:
            {
              application/json:
                { schema: { $ref: "#/components/schemas/SessionBootstrap" } },
            }
        "401": { $ref: "#/components/responses/UnauthorizedProblem" }
    post:
      operationId: logoutBrowserSession
      tags: [Authentication]
      summary: Revoke the current browser session
      description: Revokes the session represented by the secure session cookie after CSRF validation.
      security: [{ sessionCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/CsrfToken" }]
      responses:
        "204": { description: Browser session revoked }
        "401": { $ref: "#/components/responses/UnauthorizedProblem" }
  /api/v1/auth/local/login:
    post:
      operationId: loginWithLocalPassword
      tags: [Authentication]
      summary: Start an authenticated browser session with a local password
      description: Verifies the local credential and issues a host-only HttpOnly browser session cookie.
      security: []
      requestBody:
        required: true
        content:
          {
            application/json:
              { schema: { $ref: "#/components/schemas/LocalLogin" } },
          }
      responses:
        "200":
          description: Authenticated session; response sets the HttpOnly session cookie and returns a CSRF token header.
          headers:
            Set-Cookie: { schema: { type: string } }
            X-CSRF-Token: { schema: { type: string } }
          content:
            {
              application/json:
                { schema: { $ref: "#/components/schemas/SessionBootstrap" } },
            }
        "401": { $ref: "#/components/responses/UnauthorizedProblem" }
  /api/v1/auth/invitations/accept:
    post:
      operationId: acceptInvitation
      tags: [Authentication]
      summary: Accept a one-time local-user invitation
      description: Consumes a valid invitation token exactly once, verifies the delivered email address, activates the local user, and stores the chosen Argon2id password atomically.
      security: []
      requestBody:
        required: true
        content:
          {
            application/json:
              { schema: { $ref: "#/components/schemas/AcceptInvitation" } },
          }
      responses:
        "202":
          description: A uniform acceptance response that does not reveal token validity or account state.
          content:
            {
              application/json:
                { schema: { $ref: "#/components/schemas/AcceptedResponse" } },
            }
        "422": { $ref: "#/components/responses/ValidationProblem" }
  /api/v1/admin/auth-connectors:
    get:
      operationId: listAuthConnectors
      tags: [Administration]
      summary: List configured external authentication connectors
      description: Returns only non-secret connector metadata after browser-session instance-administration authorization. Client secrets, secret references, client identifiers, token endpoints, and claim mappings are never returned.
      security: [{ sessionCookie: [] }]
      responses:
        "200":
          description: Non-secret connector catalog
          content:
            {
              application/json:
                {
                  schema:
                    {
                      type: array,
                      items: { $ref: "#/components/schemas/ConnectorAdmin" },
                    },
                },
            }
        "403": { $ref: "#/components/responses/ForbiddenProblem" }
  /api/v1/admin/user-invitations:
    post:
      operationId: createLocalUserInvitation
      tags: [Administration]
      summary: Create a one-time local-user invitation
      description: Requires browser-session instance administration and CSRF validation. The activation token is returned only in this response and must be delivered through an approved secure channel.
      security: [{ sessionCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/CsrfToken" }]
      requestBody:
        required: true
        content:
          {
            application/json:
              { schema: { $ref: "#/components/schemas/CreateInvitation" } },
          }
      responses:
        "201":
          description: One-time invitation material; do not log or persist the activation token client-side.
          content:
            {
              application/json:
                { schema: { $ref: "#/components/schemas/InvitationCreated" } },
            }
        "403": { $ref: "#/components/responses/ForbiddenProblem" }
  /api/v1/admin/roles:
    get:
      operationId: listInstanceRoles
      tags: [Administration]
      summary: List instance roles
      description: Returns instance-scoped roles after the browser user passes instance role-management authorization.
      security: [{ sessionCookie: [] }]
      responses:
        "200":
          description: Instance role catalog
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Role" }
        "403": { $ref: "#/components/responses/ForbiddenProblem" }
  /api/v1/admin/role-assignments:
    get:
      operationId: listInstanceRoleAssignments
      tags: [Administration]
      summary: List active instance role assignments for one principal
      description: Returns active instance assignments for the requested user or API credential after instance role-management authorization.
      security: [{ sessionCookie: [] }]
      parameters:
        - name: principalType
          in: query
          required: true
          schema: { type: string, enum: [user, api_credential] }
        - name: principalId
          in: query
          required: true
          schema: { $ref: "#/components/schemas/UuidV7" }
      responses:
        "200":
          description: Active instance role assignments
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/RoleAssignment" }
        "403": { $ref: "#/components/responses/ForbiddenProblem" }
        "422": { $ref: "#/components/responses/ValidationProblem" }
    post:
      operationId: assignInstanceRole
      tags: [Administration]
      summary: Assign an instance role to a user or API credential
      description: Creates an instance-scoped assignment after delegation validation.
      security: [{ sessionCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/CsrfToken" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RoleAssignmentInput" }
      responses:
        "201": { $ref: "#/components/responses/RoleAssignmentResponse" }
        "403": { $ref: "#/components/responses/ForbiddenProblem" }
        "422": { $ref: "#/components/responses/ValidationProblem" }
  /api/v1/users/me/identities:
    get:
      operationId: listLinkedIdentities
      tags: [Administration]
      summary: List external identities linked to the browser user
      description: Returns only identities owned by the user represented by the browser session.
      security: [{ sessionCookie: [] }]
      responses:
        "200":
          description: Linked external identities
          content:
            {
              application/json:
                {
                  schema:
                    {
                      type: array,
                      items: { $ref: "#/components/schemas/LinkedIdentity" },
                    },
                },
            }
        "403": { $ref: "#/components/responses/ForbiddenProblem" }
  /api/v1/accounts/{account_id}/audit-events:
    parameters: [{ $ref: "#/components/parameters/AccountId" }]
    get:
      operationId: listAccountAuditEvents
      tags: [Administration]
      summary: List safe account audit events
      description: Requires the `audit:read` permission at account scope; metadata is already server-filtered.
      security: [{ bearerAuth: [audit:read] }, { sessionCookie: [] }]
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 500, default: 100 }
      responses:
        "200":
          description: Bounded audit event collection
          content:
            {
              application/json:
                {
                  schema:
                    {
                      type: array,
                      items: { $ref: "#/components/schemas/AuditEvent" },
                    },
                },
            }
        "403": { $ref: "#/components/responses/ForbiddenProblem" }
  /api/v1/accounts/{account_id}/roles:
    parameters: [{ $ref: "#/components/parameters/AccountId" }]
    get:
      operationId: listAccountRoles
      tags: [Administration]
      summary: List account roles
      description: Returns roles only after the server verifies account-scoped role-management permission.
      security: [{ bearerAuth: [roles:manage] }, { sessionCookie: [] }]
      responses:
        "200":
          description: Role catalog
          content:
            {
              application/json:
                {
                  schema:
                    {
                      type: array,
                      items: { $ref: "#/components/schemas/Role" },
                    },
                },
            }
        "403": { $ref: "#/components/responses/ForbiddenProblem" }
    post:
      operationId: createAccountRole
      tags: [Administration]
      summary: Create a constrained custom account role
      description: Creates a custom role after a browser-session administrator passes delegation checks.
      security: [{ sessionCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/CsrfToken" }]
      requestBody:
        required: true
        content:
          {
            application/json:
              { schema: { $ref: "#/components/schemas/RoleInput" } },
          }
      responses:
        "201": { $ref: "#/components/responses/RoleResponse" }
        "403": { $ref: "#/components/responses/ForbiddenProblem" }
  /api/v1/accounts/{account_id}/roles/{role_id}:
    parameters:
      - $ref: "#/components/parameters/AccountId"
      - $ref: "#/components/parameters/RoleId"
    patch:
      operationId: updateAccountRole
      tags: [Administration]
      summary: Update a constrained custom account role
      description: Updates a custom role after server-side delegation and account-scope authorization.
      security: [{ sessionCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/CsrfToken" }]
      requestBody:
        required: true
        content:
          {
            application/json:
              { schema: { $ref: "#/components/schemas/RoleInput" } },
          }
      responses:
        "200": { $ref: "#/components/responses/RoleResponse" }
        "403": { $ref: "#/components/responses/ForbiddenProblem" }
    delete:
      operationId: deleteAccountRole
      tags: [Administration]
      summary: Delete a constrained custom account role
      description: Deletes a custom role after server-side delegation and account-scope authorization.
      security: [{ sessionCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/CsrfToken" }]
      responses:
        "204": { description: Role deleted }
        "403": { $ref: "#/components/responses/ForbiddenProblem" }
  /api/v1/accounts/{account_id}/role-assignments:
    parameters: [{ $ref: "#/components/parameters/AccountId" }]
    get:
      operationId: listAccountRoleAssignments
      tags: [Administration]
      summary: List active role assignments for one principal
      description: Returns active account and system assignments for the requested user or API credential after role-management authorization.
      security: [{ sessionCookie: [] }]
      parameters:
        - name: principalType
          in: query
          required: true
          schema: { type: string, enum: [user, api_credential] }
        - name: principalId
          in: query
          required: true
          schema: { $ref: "#/components/schemas/UuidV7" }
      responses:
        "200":
          description: Active role assignments
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/RoleAssignment" }
        "403": { $ref: "#/components/responses/ForbiddenProblem" }
        "422": { $ref: "#/components/responses/ValidationProblem" }
    post:
      operationId: assignAccountRole
      tags: [Administration]
      summary: Assign a role to a user or API credential at account or system scope
      description: Creates an account- or system-scoped assignment after delegation validation.
      security: [{ sessionCookie: [] }]
      parameters: [{ $ref: "#/components/parameters/CsrfToken" }]
      requestBody:
        required: true
        content:
          {
            application/json:
              { schema: { $ref: "#/components/schemas/RoleAssignmentInput" } },
          }
      responses:
        "201": { $ref: "#/components/responses/RoleAssignmentResponse" }
        "403": { $ref: "#/components/responses/ForbiddenProblem" }
  /api/v1/accounts/{account_id}/role-assignments/{assignment_id}:
    parameters:
      - $ref: "#/components/parameters/AccountId"
      - $ref: "#/components/parameters/RoleAssignmentId"
    delete:
      operationId: revokeAccountRoleAssignment
      tags: [Administration]
      summary: Revoke a role assignment
      description: Revokes an account- or system-scoped assignment after server-side authorization.
      security: [{ sessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
        - name: systemId
          in: query
          schema: { $ref: "#/components/schemas/UuidV7" }
      responses:
        "204": { description: Role assignment revoked }
        "403": { $ref: "#/components/responses/ForbiddenProblem" }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
    sessionCookie:
      type: apiKey
      in: cookie
      name: __Host-pvlog_session
  parameters:
    UserId:
      name: id
      in: path
      required: true
      schema: { $ref: "#/components/schemas/UuidV7" }
    SystemId:
      {
        name: id,
        in: path,
        required: true,
        schema: { $ref: "#/components/schemas/UuidV7" },
      }
    AccountId:
      {
        name: account_id,
        in: path,
        required: true,
        schema: { $ref: "#/components/schemas/UuidV7" },
      }
    RoleId:
      {
        name: role_id,
        in: path,
        required: true,
        schema: { $ref: "#/components/schemas/UuidV7" },
      }
    RoleAssignmentId:
      {
        name: assignment_id,
        in: path,
        required: true,
        schema: { $ref: "#/components/schemas/UuidV7" },
      }
    CsrfToken:
      {
        name: X-CSRF-Token,
        in: header,
        required: true,
        schema: { type: string, minLength: 1 },
      }
    NestedSystemId:
      {
        name: system_id,
        in: path,
        required: true,
        schema: { $ref: "#/components/schemas/UuidV7" },
      }
    InverterId:
      name: inverter_id
      in: path
      required: true
      schema: { $ref: "#/components/schemas/UuidV7" }
    StringId:
      name: string_id
      in: path
      required: true
      schema: { $ref: "#/components/schemas/UuidV7" }
    InverterScopeId:
      name: inverterId
      in: query
      required: false
      schema: { $ref: "#/components/schemas/UuidV7" }
      description: Selects an inverter scope; required when stringId is supplied.
    StringScopeId:
      name: stringId
      in: query
      required: false
      schema: { $ref: "#/components/schemas/UuidV7" }
      description: Selects a measured PV-string scope together with inverterId.
    ObservationId:
      {
        name: observation_id,
        in: path,
        required: true,
        schema: { $ref: "#/components/schemas/UuidV7" },
      }
    ApiKeyId:
      name: api_key_id
      in: path
      required: true
      description: Opaque account API-key metadata identifier; this is not the bearer secret.
      schema: { $ref: "#/components/schemas/UuidV7" }
    IfMatch:
      {
        name: If-Match,
        in: header,
        required: true,
        schema: { type: string },
        example: '"3"',
      }
    IfNoneMatch:
      {
        name: If-None-Match,
        in: header,
        required: false,
        schema: { type: string },
        example: '"query-7f4a"',
      }
    StartEpochMillis:
      {
        name: startEpochMillis,
        in: query,
        required: true,
        schema: { type: integer, format: int64 },
        description: Inclusive UTC range start in Unix epoch milliseconds.,
      }
    EndEpochMillis:
      {
        name: endEpochMillis,
        in: query,
        required: true,
        schema: { type: integer, format: int64 },
        description: Exclusive UTC range end in Unix epoch milliseconds.,
      }
    SeriesFields:
      {
        name: fields,
        in: query,
        required: true,
        schema: { type: string, minLength: 1 },
        example: "generation_power,consumption_power",
      }
    SeriesResolution:
      {
        name: resolution,
        in: query,
        required: false,
        schema:
          { enum: [auto, raw, 15m, hour, day, month, year], default: auto },
      }
    Timezone:
      {
        name: timezone,
        in: query,
        required: false,
        schema: { type: string, default: UTC },
        description: IANA timezone used for calendar buckets and DST boundaries.,
        example: Europe/Berlin,
      }
    MaximumPoints:
      {
        name: maximumPoints,
        in: query,
        required: false,
        schema: { type: integer, minimum: 1, maximum: 10000, default: 2000 },
        description: Hard per-series point budget; responses may include at most two documented boundary points.,
      }
    YieldResolution:
      name: resolution
      in: query
      required: false
      schema: { enum: [15m, hour, day], default: hour }
      description: Modeled values use half-open UTC intervals at the selected resolution.
    YieldMaximumPoints:
      name: maximumPoints
      in: query
      required: false
      schema: { type: integer, minimum: 1, maximum: 10000, default: 2000 }
      description: Hard modeled-series point bound; oversized requests fail instead of downsampling silently.
  requestBodies:
    ManagedResource:
      content:
        application/json:
          schema: { type: object, additionalProperties: true }
          example: { name: Example resource }
    ForecastSettings:
      required: true
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ForecastSettingsInput" }
          examples:
            effectiveLosses:
              value:
                effectiveFrom: 1780000000000
                effectiveTo: null
                modelIdentifier: pvwatts-compatible
                modelRevision: 1
                losses:
                  soilingBasisPoints: 200
                  shadingBasisPoints: 300
                  mismatchBasisPoints: 100
                  wiringBasisPoints: 100
                  unavailabilityBasisPoints: 50
                calibrationBasisPoints: 0
  responses:
    Problem:
      description: Request rejected with a standards-based problem detail
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    SystemResponse:
      description: Versioned system representation
      headers: { ETag: { schema: { type: string } } }
      content:
        {
          application/json: { schema: { $ref: "#/components/schemas/System" } },
        }
    ManagedResource:
      description: Versioned managed resource
      headers: { ETag: { schema: { type: string } } }
      content:
        {
          application/json:
            { schema: { $ref: "#/components/schemas/ManagedResource" } },
        }
    ResourceList:
      description: Managed resource collection
      content:
        {
          application/json:
            {
              schema:
                {
                  type: array,
                  items: { $ref: "#/components/schemas/ManagedResource" },
                },
            },
        }
    ValidationProblem:
      {
        description: Request validation failed,
        content:
          {
            application/problem+json:
              { schema: { $ref: "#/components/schemas/Problem" } },
          },
      }
    ForecastSettingsResponse:
      description: Effective forecast settings with an optimistic-concurrency validator
      headers:
        ETag:
          { schema: { type: string }, description: Quoted settings version. }
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ForecastSettings" }
    ForecastCompletenessResponse:
      description: Effective forecast-input completeness with a configuration validator
      headers:
        ETag:
          {
            schema: { type: string },
            description: Quoted effective-configuration version.,
          }
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ForecastInputCompleteness" }
    ForecastValidationProblem:
      description: Forecast field, range, resolution, scope, or partial-result policy is invalid
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/ForecastProblem" }
    QueryTooLargeProblem:
      description: The modeled range would exceed the documented point or time bound
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    ForecastUnavailableProblem:
      description: No permitted fresh or explicitly stale weather run can satisfy this request
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    PreconditionProblem:
      {
        description: ETag precondition failed,
        content:
          {
            application/problem+json:
              { schema: { $ref: "#/components/schemas/Problem" } },
          },
      }
    ForbiddenProblem:
      {
        description: Required scope is missing,
        content:
          {
            application/problem+json:
              { schema: { $ref: "#/components/schemas/Problem" } },
          },
      }
    UnauthorizedProblem:
      {
        description: Authentication is required or the supplied credential was rejected,
        content:
          {
            application/problem+json:
              { schema: { $ref: "#/components/schemas/Problem" } },
          },
      }
    RateLimitProblem:
      description: The authenticated principal exceeded its ingestion request quota.
      headers:
        Retry-After: { schema: { type: integer, minimum: 1 } }
        RateLimit-Limit: { schema: { type: integer, minimum: 1 } }
        RateLimit-Remaining: { schema: { type: integer, minimum: 0 } }
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    RoleResponse:
      description: Versioned custom or built-in role
      content:
        { application/json: { schema: { $ref: "#/components/schemas/Role" } } }
    RoleAssignmentResponse:
      description: Created role assignment
      content:
        {
          application/json:
            { schema: { $ref: "#/components/schemas/RoleAssignment" } },
        }
    ConflictProblem:
      {
        description: Optimistic concurrency conflict,
        content:
          {
            application/problem+json:
              { schema: { $ref: "#/components/schemas/Problem" } },
          },
      }
    NotFoundProblem:
      {
        description: Notification resource was not found,
        content:
          {
            application/problem+json:
              { schema: { $ref: "#/components/schemas/Problem" } },
          },
      }
    OverloadProblem:
      {
        description: Ingestion is temporarily saturated,
        headers: { Retry-After: { schema: { type: integer, minimum: 1 } } },
        content:
          {
            application/problem+json:
              { schema: { $ref: "#/components/schemas/Problem" } },
          },
      }
    QueryProblem:
      {
        description: "Query bounds, fields, resolution, timezone, or point budget are invalid.",
        content:
          {
            application/problem+json:
              {
                schema: { $ref: "#/components/schemas/Problem" },
                example:
                  {
                    type: https://pvlog.example/problems/query,
                    title: Invalid analytics query,
                    status: 422,
                    detail: The raw query exceeds maximumPoints.,
                    requestId: 019505c8-7c85-7f0b-9bc3-2a3c4d5e6f70,
                  },
              },
          },
      }
    RequiresAsyncProblem:
      {
        description: The requested export is too large for synchronous processing; retry with asynchronous true.,
        content:
          {
            application/problem+json:
              { schema: { $ref: "#/components/schemas/Problem" } },
          },
      }
    NotAcceptable:
      description: Requested response representation is not available
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    InternalServerError:
      description: Unexpected server failure
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    ServiceUnavailableProblem:
      description: A required dependency is unavailable
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
  schemas:
    CurrentUserProfile:
      type: object
