    get:
      {
        operationId: listWebhooks,
        tags: [Notifications],
        summary: List webhook subscriptions,
        description: Returns non-secret webhook subscription metadata.,
        security: [{ bearerAuth: [webhooks:read] }],
        responses:
          {
            "200":
              {
                description: Webhook subscriptions,
                content:
                  {
                    application/json:
                      {
                        schema:
                          {
                            type: array,
                            items:
                              {
                                $ref: "#/components/schemas/WebhookSubscription",
                              },
                          },
                      },
                  },
              },
            "403": { $ref: "#/components/responses/ForbiddenProblem" },
          },
      }
    post:
      operationId: createWebhook
      tags: [Notifications]
      summary: Create a pending webhook subscription
      description: Creates a subscription and returns its endpoint verification challenge.
      security: [{ bearerAuth: [webhooks:write] }]
      requestBody:
        {
          required: true,
          content:
            {
              application/json:
                { schema: { $ref: "#/components/schemas/WebhookInput" } },
            },
        }
      callbacks:
        eventDelivery:
          "{$request.body#/endpoint}":
            post:
              summary: Receive a signed PVLog event
              description: Verifies the timestamp, event ID replay state, and keyed signature before accepting the event.
              security: []
              parameters:
                - {
                    name: X-PVLog-Event-Id,
                    in: header,
                    required: true,
                    schema: { type: string, format: uuid },
                  }
                - {
                    name: X-PVLog-Timestamp,
                    in: header,
                    required: true,
                    schema: { type: integer, format: int64 },
                  }
                - {
                    name: X-PVLog-Signature,
                    in: header,
                    required: true,
                    schema: { type: string, pattern: "^v1=[0-9a-f]{64}$" },
                  }
              requestBody:
                {
                  required: true,
                  content:
                    {
                      application/json:
                        {
                          schema: { $ref: "#/components/schemas/WebhookEvent" },
                        },
                    },
                }
              responses:
                {
                  "204": { description: Event accepted },
                  "400": { description: Signature or replay validation failed },
                }
      responses:
        {
          "201":
            {
              description: Pending subscription and verification challenge,
              content:
                {
                  application/json:
                    {
                      schema:
                        { $ref: "#/components/schemas/WebhookSubscription" },
                    },
                },
            },
          "422": { $ref: "#/components/responses/ValidationProblem" },
        }
