  /api/v1/systems/{system_id}/observations/{observation_id}:
    parameters:
      [
        { $ref: "#/components/parameters/NestedSystemId" },
        { $ref: "#/components/parameters/ObservationId" },
      ]
    patch:
      operationId: correctObservation
      summary: Correct an observation
      description: Applies an optimistic replacement or deletion overlay and schedules reconciliation.
      tags: [Telemetry]
      security: [{ bearerAuth: [telemetry:write] }]
      requestBody:
        {
          required: true,
          content:
            {
              application/json:
                {
                  schema:
                    {
                      type: object,
                      required: [expectedVersion, reason, delete],
                      properties:
                        {
                          expectedVersion: { type: integer, minimum: 1 },
                          reason: { type: string, minLength: 1 },
                          generationPowerWatts: { type: integer },
                          delete: { type: boolean },
                        },
                    },
                },
            },
        }
      responses:
        {
          "200":
            {
              description: Immediately visible merged observation,
              content: { application/json: { schema: { type: object } } },
            },
          "409": { $ref: "#/components/responses/ConflictProblem" },
        }
    delete:
      operationId: deleteObservation
      summary: Delete an observation
      description: Records an optimistic deletion while preserving audit and reconciliation history.
      tags: [Telemetry]
      security: [{ bearerAuth: [telemetry:write] }]
      parameters:
        [
          { $ref: "#/components/parameters/IfMatch" },
          {
            name: X-Correction-Reason,
            in: header,
            required: true,
            schema: { type: string, minLength: 1 },
          },
        ]
      responses:
        {
          "204": { description: Deletion accepted },
          "409": { $ref: "#/components/responses/ConflictProblem" },
        }
