name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  frontend-quality:
    name: Frontend and contract quality
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit frontend dependencies
        run: pnpm audit --audit-level high

      - name: Run frontend checks
        run: pnpm lint && pnpm typecheck && pnpm test:ui:coverage && pnpm test:structure && pnpm build && pnpm test:bundle-budget

      - name: Validate OpenAPI contract
        run: pnpm openapi:lint && pnpm openapi:routes && pnpm openapi:compare && pnpm test:local-authentication-guide && pnpm test:docs

      - name: Validate bundled equipment catalog
        run: pnpm catalog:validate && pnpm test:release-artifacts

      - name: Validate deterministic performance reports
        run: pnpm test:query-performance && pnpm test:scale-performance && pnpm test:release-artifacts

  browser-e2e:
    name: Browser end-to-end
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run browser tests
        run: pnpm test:e2e

  rust-quality:
    name: Rust quality
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install pinned Rust toolchain
        run: rustup show active-toolchain

      - name: Cache Cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock', 'Cargo.toml', 'src/crates/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Check all features
        run: cargo check-all

      - name: Run Clippy with zero warnings
        run: cargo clippy-all

      - name: Run tests
        run: cargo test-all

  rust-database-features:
    name: Rust ${{ matrix.database }} feature
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        database:
          - postgres
          - sqlite
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install pinned Rust toolchain
        run: rustup show active-toolchain

      - name: Cache Cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.database }}-${{ hashFiles('Cargo.lock', 'Cargo.toml', 'src/crates/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.database }}-
            ${{ runner.os }}-cargo-

      - name: Check database feature
        run: cargo check-${{ matrix.database }}

  rust-runtime-smoke:
    name: Rust SQLite and PostgreSQL runtime smoke
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: pvlog
          POSTGRES_PASSWORD: pvlog
          POSTGRES_USER: pvlog
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pvlog -d pvlog"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      TEST_POSTGRES_URL: postgres://pvlog:pvlog@127.0.0.1:5432/pvlog
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install pinned Rust toolchain
        run: rustup show active-toolchain

      - name: Run server and worker smoke tests
        run: cargo smoke

  rust-supply-chain:
    name: Rust supply chain
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install dependency policy tools
        run: cargo install --locked cargo-audit cargo-deny

      - name: Check security advisories
        run: cargo audit --deny warnings

      - name: Check licenses, bans, and sources
        run: cargo deny check advisories bans licenses sources

  container-image:
    name: Container image
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build unprivileged runtime image
        run: docker build --tag pvlog:ci .

      - name: Verify runtime user and command surface
        run: |
          test "$(docker image inspect pvlog:ci --format '{{.Config.User}}')" = "pvlog"
          docker run --rm pvlog:ci --help
